<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bad Boys Shift Scheduler</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0a0f; font-family: 'Arial Black', Arial, sans-serif; color: #e5e7eb; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: #0a0a0f; }
  ::-webkit-scrollbar-thumb { background: rgba(239,68,68,0.4); border-radius: 3px; }
  input::placeholder { color: #4b5563; }
  input:focus { outline: none; border-color: rgba(239,68,68,0.6) !important; }
  button:focus { outline: none; }

  /* shift badge classes */
  .s-P  { background: rgba(14,116,144,0.4);  color: #67e8f9; border: 1px solid #0e7490; }
  .s-A  { background: rgba(146,64,14,0.4);   color: #fcd34d; border: 1px solid #92400e; }
  .s-N  { background: rgba(91,33,182,0.4);   color: #c4b5fd; border: 1px solid #5b21b6; }
  .s-aa { background: rgba(107,33,168,0.4);  color: #d8b4fe; border: 1px solid #6b21a8; }
  .s-R  { background: rgba(6,78,59,0.4);     color: #6ee7b7; border: 1px solid #064e3b; }
  .s-L  { background: rgba(159,18,57,0.4);   color: #fda4af; border: 1px solid #9f1239; }

  .tab-btn { background: none; border: none; border-bottom: 2px solid transparent; color: #6b7280; padding: 10px 20px; font-size: 11px; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: all .2s; white-space: nowrap; }
  .tab-btn:hover { color: #d1d5db; }
  .tab-btn.active { color: #ef4444; border-bottom-color: #ef4444; background: rgba(239,68,68,0.15); }

  .red-btn { background: linear-gradient(135deg,#ef4444,#b91c1c); border: none; color: #fff; padding: 10px 24px; border-radius: 8px; cursor: pointer; font-weight: 900; font-size: 12px; letter-spacing: 3px; text-transform: uppercase; box-shadow: 0 0 20px rgba(239,68,68,.4); transition: box-shadow .2s; }
  .red-btn:hover { box-shadow: 0 0 30px rgba(239,68,68,.7); }
  .ghost-btn { background: rgba(239,68,68,.08); border: 1px solid rgba(239,68,68,.3); color: #f87171; padding: 10px 18px; border-radius: 8px; cursor: pointer; font-weight: 900; font-size: 12px; letter-spacing: 2px; text-transform: uppercase; transition: background .2s; }
  .ghost-btn:hover { background: rgba(239,68,68,.18); }

  .card { background: rgba(13,13,20,.8); border: 1px solid rgba(239,68,68,.2); border-radius: 12px; padding: 20px; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  .saving { animation: pulse 1s infinite; color: #ef4444; font-size: 11px; letter-spacing: 2px; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

/* ── constants ── */
const SHIFTS   = ["Π","Α","Ν","αα","Ρ","Ά"];
const SLABELS  = { Π:"Πρωινή", Α:"Απογευματινή", Ν:"Νυχτερινή", αα:"Αδιάθετο", Ρ:"Ρεπό", Ά:"Άδεια" };
const SCLS     = { Π:"s-P", Α:"s-A", Ν:"s-N", αα:"s-aa", Ρ:"s-R", Ά:"s-L" };
const SDOT     = { Π:"#38bdf8", Α:"#fbbf24", Ν:"#a78bfa", αα:"#c084fc", Ρ:"#34d399", Ά:"#fb7185" };
const MONTH_N  = ["Ιανουάριος","Φεβρουάριος","Μάρτιος","Απρίλιος","Μάιος","Ιούνιος","Ιούλιος","Αύγουστος","Σεπτέμβριος","Οκτώβριος","Νοέμβριος","Δεκέμβριος"];
const DAY_N    = ["ΚΥΡ","ΔΕΥ","ΤΡΙ","ΤΕΤ","ΠΕΜ","ΠΑΡ","ΣΑΒ"];

const getDays   = (y,m) => new Date(y,m+1,0).getDate();
const monthKey  = (y,m) => `${y}-${String(m+1).padStart(2,"0")}`;

/* ── localStorage storage shim (cross-browser persistence) ── */
const store = {
  get: (k) => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : null; } catch { return null; } },
  set: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} },
};

/* ── auto-scheduler ── */
function autoGenerate(members, year, month, prefs) {
  const days = getDays(year, month);
  const n = members.length;
  if (!n) return {};

  const sched = {};
  members.forEach(m => { sched[m.id] = {}; });

  const mprefs = {};
  members.forEach(m => { mprefs[m.id] = { leaves: [], dayoffs: [] }; });
  if (prefs) members.forEach(m => {
    const p = prefs[m.id];
    if (!p) return;
    if (p.leaves)  mprefs[m.id].leaves  = p.leaves;
    if (p.dayoffs) mprefs[m.id].dayoffs = p.dayoffs;
  });

  // Apply fixed preferences first
  members.forEach(m => {
    mprefs[m.id].leaves.forEach(d  => { sched[m.id][d] = "Ά"; });
    mprefs[m.id].dayoffs.forEach(d => { if (!sched[m.id][d]) sched[m.id][d] = "Ρ"; });
  });

  const shiftCnt = {};
  members.forEach(m => { shiftCnt[m.id] = { Π:0, Α:0, Ν:0, Ρ:0 }; });
  const nightNext = {};

  for (let d = 1; d <= days; d++) {
    const onLeave = members.filter(m => sched[m.id][d] === "Ά").length;

    // Force αα after night
    members.forEach(m => {
      if (nightNext[m.id] && !sched[m.id][d]) {
        sched[m.id][d] = "αα";
        nightNext[m.id] = false;
      }
    });

    const free = members.filter(m => !sched[m.id][d]);
    if (!free.length) continue;

    let repoPerDay = onLeave === 0 ? Math.floor(n / 4) : onLeave === 1 ? 1 : 0;

    const sortBy = (s) => [...free].sort((a,b) => (shiftCnt[a.id][s]||0) - (shiftCnt[b.id][s]||0));
    const assigned = new Set();

    for (const slot of ["Ν","Α","Π"]) {
      const cands = sortBy(slot).filter(m => !assigned.has(m.id));
      if (cands.length) {
        const pick = cands[0];
        sched[pick.id][d] = slot;
        shiftCnt[pick.id][slot]++;
        assigned.add(pick.id);
        if (slot === "Ν") nightNext[pick.id] = true;
      }
    }

    let repoGiven = 0;
    free.filter(m => !assigned.has(m.id)).forEach(m => {
      if (repoPerDay > 0 && repoGiven < repoPerDay) {
        sched[m.id][d] = "Ρ"; shiftCnt[m.id].Ρ++; repoGiven++;
      } else {
        sched[m.id][d] = "Ρ"; shiftCnt[m.id].Ρ++;
      }
    });
  }
  return sched;
}

/* ── App ── */
function App() {
  const today = new Date();
  const [year,  setYear]    = useState(today.getFullYear());
  const [month, setMonth]   = useState(today.getMonth());
  const [members, setMembers] = useState([]);
  const [schedule, setSchedule] = useState({});
  const [prefs,    setPrefs]    = useState({});
  const [tab,      setTab]      = useState("schedule");
  const [activeCell, setActiveCell] = useState(null);
  const [newName,    setNewName]    = useState("");
  const [prefMember, setPrefMember] = useState(null);
  const [prefType,   setPrefType]   = useState("leaves");
  const [saveMsg,    setSaveMsg]    = useState("");
  const [saving,     setSaving]     = useState(false);

  const mk = monthKey(year, month);
  const days = getDays(year, month);

  // Load from localStorage
  useEffect(() => {
    const m = store.get("bb2_members");
    if (m) setMembers(m);
    const s = store.get(`bb2_sched_${mk}`);
    if (s) setSchedule(s); else setSchedule({});
    const p = store.get(`bb2_prefs_${mk}`);
    if (p) setPrefs(p); else setPrefs({});
  }, [mk]);

  const persist = (ns) => {
    setSaving(true);
    store.set(`bb2_sched_${mk}`, ns);
    setSaving(false);
    setSaveMsg("SAVED ✓");
    setTimeout(() => setSaveMsg(""), 1500);
  };
  const persistPrefs   = (p) => store.set(`bb2_prefs_${mk}`, p);
  const persistMembers = (m) => store.set("bb2_members", m);

  const getShift = (mid, d) => schedule[mid]?.[d] ?? "";

  const setShift = (mid, d, val) => {
    const ns = { ...schedule, [mid]: { ...(schedule[mid]||{}), [d]: val } };
    setSchedule(ns); persist(ns); setActiveCell(null);
  };

  const addMember = () => {
    const name = newName.trim(); if (!name) return;
    const m = [...members, { id: Date.now().toString(), name }];
    setMembers(m); persistMembers(m); setNewName("");
  };

  const removeMember = (id) => {
    const m = members.filter(x => x.id !== id);
    setMembers(m); persistMembers(m);
  };

  const togglePref = (mid, day, type) => {
    const cur  = prefs[mid] || { leaves:[], dayoffs:[] };
    const list = [...(cur[type]||[])];
    const idx  = list.indexOf(day);
    if (idx === -1) list.push(day); else list.splice(idx, 1);
    const np = { ...prefs, [mid]: { ...cur, [type]: list } };
    setPrefs(np); persistPrefs(np);
  };
  const hasPref = (mid, day, type) => (prefs[mid]?.[type]||[]).includes(day);

  const generate = () => {
    let ns = autoGenerate(members, year, month, prefs);
    members.forEach(m => {
      (prefs[m.id]?.leaves  ||[]).forEach(d => { ns[m.id][d] = "Ά"; });
      (prefs[m.id]?.dayoffs ||[]).forEach(d => { ns[m.id][d] = "Ρ"; });
    });
    setSchedule(ns); persist(ns);
  };

  const clearSched = () => { setSchedule({}); persist({}); };

  const getStats = (mid) => {
    const c = { Π:0, Α:0, Ν:0, αα:0, Ρ:0, Ά:0, total:0 };
    for (let d = 1; d <= days; d++) {
      const s = getShift(mid, d);
      if (s && c[s] !== undefined) c[s]++;
      if (["Π","Α","Ν"].includes(s)) c.total++;
    }
    return c;
  };

  const warnings = (() => {
    const w = [];
    members.forEach(m => {
      for (let d = 1; d < days; d++) {
        if (getShift(m.id,d) === "Ν" && getShift(m.id,d+1) !== "αα" && getShift(m.id,d+1) !== "")
          w.push(`${m.name}: Μετά νύχτα ${d}/${month+1} λείπει αδιάθετο`);
      }
    });
    for (let d = 1; d <= days; d++) {
      const ol = members.filter(m => getShift(m.id,d) === "Ά").length;
      if (ol > 2) w.push(`Ημέρα ${d}/${month+1}: ${ol} σε άδεια (max 2)`);
    }
    return w;
  })();

  const getDayName = d => DAY_N[new Date(year,month,d).getDay()];
  const isWeekend  = d => [0,6].includes(new Date(year,month,d).getDay());
  const isToday    = d => d===today.getDate() && month===today.getMonth() && year===today.getFullYear();

  const prevMonth = () => { if (month===0){setMonth(11);setYear(y=>y-1);}else setMonth(m=>m-1); };
  const nextMonth = () => { if (month===11){setMonth(0);setYear(y=>y+1);}else setMonth(m=>m+1); };

  /* close cell picker on outside click */
  useEffect(() => {
    const h = () => setActiveCell(null);
    document.addEventListener("click", h);
    return () => document.removeEventListener("click", h);
  }, []);

  /* ── render ── */
  return (
    <div style={{ minHeight:"100vh", background:"linear-gradient(160deg,#0a0a0f 0%,#12060f 50%,#0a0a14 100%)" }}>
      {/* ambient glows */}
      <div style={{ position:"fixed", inset:0, pointerEvents:"none", zIndex:0, overflow:"hidden" }}>
        <div style={{ position:"absolute", top:"-20%", left:"-10%", width:600, height:600, borderRadius:"50%", background:"radial-gradient(circle,rgba(239,68,68,.08) 0%,transparent 70%)" }} />
        <div style={{ position:"absolute", bottom:"-20%", right:"-10%", width:500, height:500, borderRadius:"50%", background:"radial-gradient(circle,rgba(99,102,241,.07) 0%,transparent 70%)" }} />
      </div>

      {/* ── Header ── */}
      <div style={{ position:"sticky", top:0, zIndex:50, background:"rgba(10,10,15,.95)", borderBottom:"1px solid rgba(239,68,68,.3)", backdropFilter:"blur(12px)" }}>
        <div style={{ padding:"12px 16px", display:"flex", alignItems:"center", justifyContent:"space-between", flexWrap:"wrap", gap:8 }}>
          <div style={{ display:"flex", alignItems:"center", gap:12 }}>
            <span style={{ fontSize:28, filter:"drop-shadow(0 0 12px rgba(239,68,68,.8))" }}>🔫</span>
            <div>
              <div style={{ fontSize:18, fontWeight:900, letterSpacing:3, color:"#ef4444", textShadow:"0 0 20px rgba(239,68,68,.6)", textTransform:"uppercase" }}>Bad Boys Shift</div>
              <div style={{ fontSize:10, letterSpacing:4, color:"#6b7280", textTransform:"uppercase" }}>{MONTH_N[month]} {year} • Πρόγραμμα Υπηρεσιών</div>
            </div>
          </div>
          <div style={{ display:"flex", alignItems:"center", gap:8, flexWrap:"wrap" }}>
            <button className="ghost-btn" style={{ padding:"6px 12px", fontSize:16 }} onClick={prevMonth}>‹</button>
            <span style={{ fontSize:13, fontWeight:900, letterSpacing:2, color:"#f87171", minWidth:160, textAlign:"center" }}>{MONTH_N[month].toUpperCase()} {year}</span>
            <button className="ghost-btn" style={{ padding:"6px 12px", fontSize:16 }} onClick={nextMonth}>›</button>
            {saving  && <span className="saving">SAVING...</span>}
            {saveMsg && <span style={{ color:"#34d399", fontSize:11, fontWeight:900, letterSpacing:2 }}>{saveMsg}</span>}
          </div>
        </div>
        {/* tabs */}
        <div style={{ display:"flex", borderTop:"1px solid rgba(239,68,68,.15)", overflowX:"auto" }}>
          {[["schedule","📅 ΠΡΟΓΡΑΜΜΑ"],["prefs","🎯 ΕΠΙΘΥΜΙΕΣ"],["stats","📊 ΣΤΑΤΙΣΤΙΚΑ"],["settings","⚙️ ΡΥΘΜΙΣΕΙΣ"]].map(([id,lbl])=>(
            <button key={id} className={`tab-btn${tab===id?" active":""}`} onClick={()=>setTab(id)}>{lbl}</button>
          ))}
        </div>
      </div>

      <div style={{ position:"relative", zIndex:1, padding:16 }}>

        {/* warnings */}
        {warnings.length > 0 && (
          <div style={{ marginBottom:16, padding:12, borderRadius:8, background:"rgba(239,68,68,.08)", border:"1px solid rgba(239,68,68,.3)" }}>
            <div style={{ color:"#ef4444", fontWeight:900, fontSize:12, letterSpacing:2, marginBottom:6 }}>⚠️ ΠΑΡΑΒΙΑΣΕΙΣ ΚΑΝΟΝΩΝ</div>
            {warnings.map((w,i)=><div key={i} style={{ color:"#fca5a5", fontSize:12 }}>{w}</div>)}
          </div>
        )}

        {/* ════ SCHEDULE ════ */}
        {tab==="schedule" && (<>
          <div style={{ marginBottom:16, display:"flex", gap:10, alignItems:"center", flexWrap:"wrap" }}>
            <button className="red-btn" onClick={generate}>🔄 ΔΗΜΙΟΥΡΓΙΑ ΠΡΟΓΡΑΜΜΑΤΟΣ</button>
            <button className="ghost-btn" onClick={clearSched}>🗑 ΚΑΘΑΡΙΣΜΟΣ</button>
            <span style={{ fontSize:11, color:"#6b7280", letterSpacing:1 }}>Κλικ σε κελί για χειροκίνητη αλλαγή</span>
          </div>

          {members.length===0 ? (
            <div style={{ textAlign:"center", padding:60, background:"rgba(239,68,68,.05)", borderRadius:12, border:"1px solid rgba(239,68,68,.2)" }}>
              <div style={{ fontSize:48, marginBottom:12 }}>👥</div>
              <div style={{ color:"#ef4444", fontWeight:900, fontSize:16, letterSpacing:3, marginBottom:8 }}>ΔΕΝ ΥΠΑΡΧΟΥΝ ΜΕΛΗ</div>
              <div style={{ color:"#6b7280", fontSize:13, marginBottom:16 }}>Προσθέστε μέλη από τις Ρυθμίσεις</div>
              <button className="red-btn" onClick={()=>setTab("settings")}>ΡΥΘΜΙΣΕΙΣ →</button>
            </div>
          ) : (
            <div style={{ overflowX:"auto", borderRadius:12, border:"1px solid rgba(239,68,68,.2)", boxShadow:"0 0 40px rgba(239,68,68,.05)" }}>
              <table style={{ borderCollapse:"collapse", minWidth: Math.max(700, 140+days*46) }}>
                <thead>
                  <tr style={{ background:"rgba(10,10,15,.9)" }}>
                    <th style={{ position:"sticky", left:0, zIndex:15, padding:"12px 16px", textAlign:"left", fontSize:11, letterSpacing:3, color:"#ef4444", fontWeight:900, textTransform:"uppercase", background:"#0d0d14", borderBottom:"1px solid rgba(239,68,68,.3)", borderRight:"1px solid rgba(239,68,68,.2)", minWidth:140 }}>ΜΕΛΟΣ</th>
                    {Array.from({length:days},(_,i)=>i+1).map(d=>(
                      <th key={d} style={{ padding:"8px 4px", textAlign:"center", minWidth:44, fontSize:10, fontWeight:900, letterSpacing:1,
                        background: isToday(d)?"rgba(239,68,68,.3)":isWeekend(d)?"rgba(99,102,241,.1)":"rgba(10,10,15,.9)",
                        color: isToday(d)?"#fca5a5":isWeekend(d)?"#818cf8":"#9ca3af",
                        borderBottom: isToday(d)?"2px solid #ef4444":"1px solid rgba(239,68,68,.2)",
                        borderRight:"1px solid rgba(239,68,68,.1)",
                      }}>
                        <div>{d}</div>
                        <div style={{ fontSize:9, opacity:.7, fontWeight:400 }}>{getDayName(d)}</div>
                      </th>
                    ))}
                    <th style={{ padding:"12px 8px", textAlign:"center", fontSize:11, letterSpacing:2, color:"#ef4444", fontWeight:900, background:"rgba(10,10,15,.9)", borderBottom:"1px solid rgba(239,68,68,.3)", minWidth:52 }}>ΣΥΝ</th>
                  </tr>
                </thead>
                <tbody>
                  {members.map((member,mi)=>{
                    const stats = getStats(member.id);
                    return (
                      <tr key={member.id} style={{ background: mi%2===0?"rgba(15,15,22,.8)":"rgba(10,10,18,.6)" }}>
                        <td style={{ position:"sticky", left:0, zIndex:10, padding:"10px 16px", fontWeight:900, fontSize:13, letterSpacing:1, background: mi%2===0?"#0d0d14":"#0b0b12", borderRight:"1px solid rgba(239,68,68,.2)", borderBottom:"1px solid rgba(239,68,68,.1)", color:"#f3f4f6", whiteSpace:"nowrap" }}>
                          <span style={{ display:"inline-flex", alignItems:"center", gap:6 }}>
                            <span style={{ width:6, height:6, borderRadius:"50%", background:"#ef4444", boxShadow:"0 0 6px #ef4444", display:"inline-block", flexShrink:0 }} />
                            {member.name}
                          </span>
                        </td>
                        {Array.from({length:days},(_,i)=>i+1).map(d=>{
                          const shift = getShift(member.id,d);
                          const isActive = activeCell?.memberId===member.id && activeCell?.day===d;
                          const hasLP = hasPref(member.id,d,"leaves");
                          const hasDP = hasPref(member.id,d,"dayoffs");
                          return (
                            <td key={d} style={{ padding:"4px 3px", textAlign:"center", cursor:"pointer", position:"relative", borderRight:"1px solid rgba(239,68,68,.08)", borderBottom:"1px solid rgba(239,68,68,.1)", background: isWeekend(d)?"rgba(99,102,241,.03)":"transparent", minWidth:44 }}
                              onClick={e=>{ e.stopPropagation(); setActiveCell(isActive?null:{memberId:member.id,day:d}); }}>
                              {shift
                                ? <span className={SCLS[shift]} style={{ display:"inline-block", padding:"3px 5px", borderRadius:5, fontSize:11, fontWeight:900, letterSpacing:.5 }}>{shift}</span>
                                : <span style={{ color:"rgba(107,114,128,.4)", fontSize:12 }}>—</span>
                              }
                              {(hasLP||hasDP) && <span style={{ position:"absolute", top:2, right:2, width:5, height:5, borderRadius:"50%", background:hasLP?"#fb7185":"#34d399", boxShadow:`0 0 4px ${hasLP?"#fb7185":"#34d399"}` }} />}
                              {isActive && (
                                <div style={{ position:"absolute", top:"calc(100% + 4px)", left:"50%", transform:"translateX(-50%)", zIndex:100, background:"rgba(13,13,20,.98)", border:"1px solid rgba(239,68,68,.4)", borderRadius:10, padding:10, display:"flex", flexWrap:"wrap", gap:5, minWidth:170, boxShadow:"0 8px 32px rgba(0,0,0,.8),0 0 20px rgba(239,68,68,.15)" }}
                                  onClick={e=>e.stopPropagation()}>
                                  <div style={{ width:"100%", fontSize:9, letterSpacing:2, color:"#6b7280", fontWeight:900, marginBottom:3 }}>ΕΠΙΛΟΓΗ ΒΑΡΔΙΑΣ</div>
                                  {SHIFTS.map(s=>(
                                    <button key={s} className={SCLS[s]} onClick={()=>setShift(member.id,d,s)}
                                      style={{ padding:"5px 9px", borderRadius:6, fontSize:11, fontWeight:900, cursor:"pointer", outline: shift===s?"2px solid #ef4444":"none" }}>
                                      {s}
                                    </button>
                                  ))}
                                  <button onClick={()=>setShift(member.id,d,"")}
                                    style={{ padding:"5px 9px", borderRadius:6, fontSize:11, fontWeight:900, cursor:"pointer", background:"rgba(107,114,128,.2)", border:"1px solid rgba(107,114,128,.4)", color:"#9ca3af" }}>✕</button>
                                </div>
                              )}
                            </td>
                          );
                        })}
                        <td style={{ padding:"10px 8px", textAlign:"center", fontWeight:900, fontSize:14, color:"#ef4444", textShadow:"0 0 10px rgba(239,68,68,.5)", borderBottom:"1px solid rgba(239,68,68,.1)" }}>{stats.total}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          )}

          {/* legend */}
          <div style={{ marginTop:16, display:"flex", flexWrap:"wrap", gap:8, alignItems:"center" }}>
            {SHIFTS.map(s=>(
              <span key={s} className={SCLS[s]} style={{ display:"inline-flex", alignItems:"center", gap:5, padding:"4px 10px", borderRadius:20, fontSize:11, fontWeight:700 }}>
                <span style={{ width:6, height:6, borderRadius:"50%", background:SDOT[s], boxShadow:`0 0 6px ${SDOT[s]}`, display:"inline-block" }} />
                {s} – {SLABELS[s]}
              </span>
            ))}
          </div>
        </>)}

        {/* ════ PREFS ════ */}
        {tab==="prefs" && (
          <div>
            <div style={{ marginBottom:20 }}>
              <div style={{ color:"#ef4444", fontWeight:900, fontSize:14, letterSpacing:3, textTransform:"uppercase", marginBottom:4 }}>🎯 Επιθυμίες Μελών</div>
              <div style={{ color:"#6b7280", fontSize:12 }}>Επιλέξτε μέλος και σημειώστε ποιες μέρες θέλει άδεια ή ρεπό.</div>
            </div>
            {members.length===0
              ? <div style={{ textAlign:"center", padding:40, color:"#6b7280" }}>Προσθέστε πρώτα μέλη.</div>
              : (<>
                  <div style={{ display:"flex", gap:8, flexWrap:"wrap", marginBottom:16 }}>
                    {members.map(m=>(
                      <button key={m.id} onClick={()=>setPrefMember(prefMember?.id===m.id?null:m)}
                        style={{ padding:"8px 16px", borderRadius:8, cursor:"pointer", fontWeight:900, fontSize:12, letterSpacing:2, textTransform:"uppercase", transition:"all .2s",
                          background: prefMember?.id===m.id?"linear-gradient(135deg,#ef4444,#b91c1c)":"rgba(239,68,68,.08)",
                          color: prefMember?.id===m.id?"white":"#f87171",
                          boxShadow: prefMember?.id===m.id?"0 0 20px rgba(239,68,68,.4)":"none",
                          border: prefMember?.id===m.id?"none":"1px solid rgba(239,68,68,.3)",
                        }}>{m.name}</button>
                    ))}
                  </div>

                  {prefMember && (<>
                    <div style={{ display:"flex", gap:8, marginBottom:16 }}>
                      {[["leaves","🏖️ ΑΔΕΙΑ","#fb7185"],["dayoffs","💤 ΡΕΠΟ","#34d399"]].map(([type,lbl,col])=>(
                        <button key={type} onClick={()=>setPrefType(type)}
                          style={{ padding:"8px 20px", borderRadius:8, cursor:"pointer", fontWeight:900, fontSize:12, letterSpacing:2, transition:"all .2s",
                            background: prefType===type?col:"rgba(255,255,255,.05)",
                            color: prefType===type?"#0a0a0f":col,
                            border:`1px solid ${prefType===type?col:"rgba(255,255,255,.1)"}`,
                            boxShadow: prefType===type?`0 0 15px ${col}66`:"none",
                          }}>{lbl}</button>
                      ))}
                    </div>

                    <div style={{ marginBottom:12, fontSize:12, color:"#9ca3af" }}>
                      <span style={{ color:"#fb7185", fontWeight:900 }}>{(prefs[prefMember.id]?.leaves||[]).length}</span> ημέρες άδειας &nbsp;|&nbsp;
                      <span style={{ color:"#34d399", fontWeight:900 }}>{(prefs[prefMember.id]?.dayoffs||[]).length}</span> ημέρες ρεπό
                    </div>

                    <div style={{ display:"grid", gridTemplateColumns:"repeat(7, minmax(44px,1fr))", gap:6, maxWidth:360 }}>
                      {DAY_N.map(dn=>(
                        <div key={dn} style={{ textAlign:"center", fontSize:9, fontWeight:900, letterSpacing:2, color:"#6b7280", padding:"4px 0" }}>{dn}</div>
                      ))}
                      {Array.from({ length: (() => { const d=new Date(year,month,1).getDay(); return d===0?6:d-1; })() }).map((_,i)=><div key={`o${i}`}/>)}
                      {Array.from({length:days},(_,i)=>i+1).map(d=>{
                        const isL = hasPref(prefMember.id,d,"leaves");
                        const isD = hasPref(prefMember.id,d,"dayoffs");
                        const active = prefType==="leaves"?isL:isD;
                        const other  = prefType==="leaves"?isD:isL;
                        return (
                          <button key={d} onClick={()=>togglePref(prefMember.id,d,prefType)}
                            style={{ padding:"8px 4px", borderRadius:8, cursor:"pointer", fontWeight:900, fontSize:13, textAlign:"center", transition:"all .2s", position:"relative",
                              background: active ? (prefType==="leaves"?"rgba(251,113,133,.3)":"rgba(52,211,153,.3)") : isWeekend(d)?"rgba(99,102,241,.08)":"rgba(255,255,255,.04)",
                              color: active ? (prefType==="leaves"?"#fb7185":"#34d399") : isToday(d)?"#ef4444":"#e5e7eb",
                              boxShadow: active?`0 0 12px ${prefType==="leaves"?"rgba(251,113,133,.4)":"rgba(52,211,153,.4)"}`:"none",
                              border: active?`1px solid ${prefType==="leaves"?"rgba(251,113,133,.5)":"rgba(52,211,153,.5)"}`:"1px solid rgba(255,255,255,.06)",
                              transform: active?"scale(1.05)":"scale(1)",
                            }}>
                            {d}
                            {other && <span style={{ position:"absolute", bottom:2, right:2, width:4, height:4, borderRadius:"50%", background:prefType==="leaves"?"#34d399":"#fb7185" }} />}
                          </button>
                        );
                      })}
                    </div>

                    <div style={{ marginTop:20 }}>
                      <button className="ghost-btn" style={{ fontSize:11 }}
                        onClick={()=>{ const np={...prefs,[prefMember.id]:{leaves:[],dayoffs:[]}}; setPrefs(np); persistPrefs(np); }}>
                        🗑 ΚΑΘΑΡΙΣΜΟΣ ΕΠΙΘΥΜΙΩΝ
                      </button>
                    </div>
                  </>)}
                  {!prefMember && <div style={{ textAlign:"center", padding:40, color:"#4b5563", fontSize:13 }}>Επιλέξτε μέλος</div>}
                </>)
            }
          </div>
        )}

        {/* ════ STATS ════ */}
        {tab==="stats" && (
          <div>
            <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(240px,1fr))", gap:16, marginBottom:16 }}>
              {members.map(member=>{
                const stats = getStats(member.id);
                return (
                  <div key={member.id} className="card">
                    <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:14, paddingBottom:10, borderBottom:"1px solid rgba(239,68,68,.2)" }}>
                      <span style={{ width:8, height:8, borderRadius:"50%", background:"#ef4444", boxShadow:"0 0 8px #ef4444", display:"inline-block", flexShrink:0 }} />
                      <span style={{ fontWeight:900, fontSize:14, letterSpacing:1, color:"#f3f4f6" }}>{member.name}</span>
                      <span style={{ marginLeft:"auto", fontWeight:900, fontSize:18, color:"#ef4444", textShadow:"0 0 10px rgba(239,68,68,.5)" }}>{stats.total}</span>
                    </div>
                    {SHIFTS.map(s=>(
                      <div key={s} style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:6 }}>
                        <span className={SCLS[s]} style={{ display:"inline-flex", alignItems:"center", gap:6, fontSize:11, fontWeight:700, padding:"2px 8px", borderRadius:12 }}>
                          <span style={{ width:5, height:5, borderRadius:"50%", background:SDOT[s], display:"inline-block" }} />
                          {s} {SLABELS[s]}
                        </span>
                        <span style={{ fontWeight:900, fontSize:16, color: stats[s]>0?SDOT[s]:"#4b5563", textShadow: stats[s]>0?`0 0 8px ${SDOT[s]}66`:"none" }}>{stats[s]}</span>
                      </div>
                    ))}
                  </div>
                );
              })}
            </div>

            <div className="card">
              <div style={{ fontWeight:900, fontSize:12, letterSpacing:3, color:"#ef4444", marginBottom:12, textTransform:"uppercase" }}>Άδειες ανά ημέρα</div>
              <div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>
                {Array.from({length:days},(_,i)=>i+1).map(d=>{
                  const ol = members.filter(m=>getShift(m.id,d)==="Ά").length;
                  return (
                    <div key={d} style={{ display:"flex", flexDirection:"column", alignItems:"center", padding:"6px 8px", borderRadius:8, minWidth:36,
                      background: ol>2?"rgba(239,68,68,.3)":ol===2?"rgba(251,191,36,.15)":ol===1?"rgba(251,113,133,.1)":"rgba(255,255,255,.03)",
                      border: ol>2?"1px solid rgba(239,68,68,.6)":ol>0?"1px solid rgba(251,113,133,.3)":"1px solid rgba(255,255,255,.05)",
                    }}>
                      <span style={{ fontSize:11, fontWeight:900, color: ol>2?"#fca5a5":"#9ca3af" }}>{d}</span>
                      <span style={{ fontSize:10, color: ol>0?"#fb7185":"#4b5563" }}>{ol>0?`${ol}Ά`:"·"}</span>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
        )}

        {/* ════ SETTINGS ════ */}
        {tab==="settings" && (
          <div style={{ maxWidth:500, display:"flex", flexDirection:"column", gap:20 }}>
            <div className="card">
              <div style={{ fontWeight:900, fontSize:13, letterSpacing:3, color:"#ef4444", marginBottom:16, textTransform:"uppercase" }}>👥 Μέλη Ομάδας</div>
              <div style={{ display:"flex", flexDirection:"column", gap:8, marginBottom:16 }}>
                {members.map(m=>(
                  <div key={m.id} style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"10px 14px", borderRadius:8, background:"rgba(239,68,68,.05)", border:"1px solid rgba(239,68,68,.15)" }}>
                    <span style={{ display:"flex", alignItems:"center", gap:8, fontWeight:700, fontSize:13 }}>
                      <span style={{ width:6, height:6, borderRadius:"50%", background:"#ef4444", boxShadow:"0 0 6px #ef4444", display:"inline-block" }} />
                      {m.name}
                    </span>
                    <button className="ghost-btn" style={{ padding:"4px 12px", fontSize:11 }} onClick={()=>removeMember(m.id)}>ΑΦΑΙΡΕΣΗ</button>
                  </div>
                ))}
                {members.length===0 && <div style={{ color:"#6b7280", fontSize:12, textAlign:"center", padding:16 }}>Δεν υπάρχουν μέλη ακόμα.</div>}
              </div>
              <div style={{ display:"flex", gap:8 }}>
                <input value={newName} onChange={e=>setNewName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addMember()}
                  placeholder="Όνομα νέου μέλους..."
                  style={{ flex:1, padding:"10px 14px", borderRadius:8, background:"rgba(255,255,255,.05)", border:"1px solid rgba(239,68,68,.3)", color:"#f3f4f6", fontSize:13, fontFamily:"inherit" }} />
                <button className="red-btn" style={{ padding:"10px 20px" }} onClick={addMember}>+ ΠΡΟΣΘΗΚΗ</button>
              </div>
            </div>

            <div className="card">
              <div style={{ fontWeight:900, fontSize:13, letterSpacing:3, color:"#ef4444", marginBottom:16, textTransform:"uppercase" }}>📖 Κανονισμοί</div>
              <div style={{ display:"flex", flexDirection:"column", gap:8, fontSize:12, color:"#9ca3af" }}>
                {[["Π – Πρωινή","06:00 – 14:00","#38bdf8"],["Α – Απογευματινή","14:00 – 22:00","#fbbf24"],["Ν – Νυχτερινή","22:00 – 06:00 (επόμενης)","#a78bfa"],["αα – Αδιάθετο","Πάντα μετά από νυχτερινή","#c084fc"],["Ρ – Ρεπό","Ημέρα ανάπαυσης","#34d399"],["Ά – Άδεια","Max 2 ταυτόχρονα","#fb7185"]].map(([lbl,desc,col])=>(
                  <div key={lbl} style={{ display:"flex", gap:10, alignItems:"center", padding:"8px 10px", borderRadius:8, background:"rgba(255,255,255,.02)", border:"1px solid rgba(255,255,255,.05)" }}>
                    <span style={{ width:8, height:8, borderRadius:"50%", background:col, boxShadow:`0 0 6px ${col}`, display:"inline-block", flexShrink:0 }} />
                    <span style={{ fontWeight:900, color:"#e5e7eb", minWidth:150 }}>{lbl}</span>
                    <span>{desc}</span>
                  </div>
                ))}
                <div style={{ marginTop:8, paddingTop:12, borderTop:"1px solid rgba(239,68,68,.15)", display:"flex", flexDirection:"column", gap:6 }}>
                  {["Δίκαιη κατανομή μεταξύ 6 μελών","Ισομερή ρεπό (±1 αποδεκτό)","1 άδεια → υπόλοιποι με 1 ρεπό","2 άδειες → χωρίς ρεπό (Α→Π→Ν→αα→...)"].map(r=>(
                    <div key={r} style={{ display:"flex", gap:8, alignItems:"center" }}>
                      <span style={{ color:"#ef4444", flexShrink:0 }}>▸</span><span>{r}</span>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
