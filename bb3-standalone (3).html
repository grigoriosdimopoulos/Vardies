<script type="text/babel">
const {useState,useEffect,useMemo}=React;

/* ── Constants ── */
const WORK=['Π','Α','Ν'];
const ALL_S=['Π','Α','Ν','αα','Ρ','Ά','Αν'];
const SHORT={Π:'Πρωί',Α:'Απόγ.',Ν:'Νύχτα',αα:'αα',Ρ:'Ρεπό',Ά:'Άδεια',Αν:'Αναρρ.'};
const LABEL={Π:'Πρωί 06-14',Α:'Απόγευμα 14-22',Ν:'Νύχτα 22-06',αα:'Αδιάθετο',Ρ:'Ρεπό',Ά:'Άδεια',Αν:'Αναρρωτική'};
const COL={
  Π:{bg:'#dbeafe',tx:'#1e3a8a',bd:'#93c5fd'},
  Α:{bg:'#fef3c7',tx:'#78350f',bd:'#fcd34d'},
  Ν:{bg:'#1e1b4b',tx:'#c7d2fe',bd:'#4338ca'},
  αα:{bg:'#f3e8ff',tx:'#581c87',bd:'#c4b5fd'},
  Ρ:{bg:'#dcfce7',tx:'#14532d',bd:'#86efac'},
  Ά:{bg:'#fee2e2',tx:'#7f1d1d',bd:'#fca5a5'},
  Αν:{bg:'#ffedd5',tx:'#7c2d12',bd:'#fb923c'},
};
const MONTHS=['Ιανουάριος','Φεβρουάριος','Μάρτιος','Απρίλιος','Μάιος','Ιούνιος','Ιούλιος','Αύγουστος','Σεπτέμβριος','Οκτώβριος','Νοέμβριος','Δεκέμβριος'];
const DAYS=['ΚΥΡ','ΔΕΥ','ΤΡΙ','ΤΕΤ','ΠΕΜ','ΠΑΡ','ΣΑΒ'];
const RANKS=['Αστυφύλακας','Αρχιφύλακας','Υπαρχιφύλακας','Ανθυπαστυνόμος','Υπαστυνόμος Β\'','Υπαστυνόμος Α\''];
const HOLIDAYS=['01-01','01-06','03-25','05-01','08-15','10-28','12-25','12-26'];

const getDays=(y,m)=>new Date(y,m+1,0).getDate();
const mkey=(y,m)=>`${y}-${String(m+1).padStart(2,'0')}`;
const pmkey=(y,m)=>m===0?mkey(y-1,11):mkey(y,m-1);
const dow=(y,m,d)=>new Date(y,m,d).getDay();
const isWE=(y,m,d)=>[0,6].includes(dow(y,m,d));
const isHol=(m,d)=>HOLIDAYS.includes(`${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`);

/* ── Storage ── */
const S={
  set(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{}},
  get(k){try{const v=localStorage.getItem(k);return v?JSON.parse(v):null}catch{return null}}
};

/* ══════════════════════════════════════════════════════
   SCHEDULER
   
   GUARANTEED COVERAGE ALGORITHM:
   
   For each day d (1..days):
     1. Mark BLOCKED: anyone with approved leave/sick on day d
        AND anyone who did Ν yesterday (→ they get αα today, BLOCKED)
     2. For Π, Α, Ν in order:
        - Pick the BEST available (not blocked, not already assigned today)
          sorted by fairness score (fewest of that shift type + cross-month)
        - If nobody available → CRITICAL ERROR (shown in UI, must fix manually)
     3. Everyone else gets Ρ (or αα if they did Ν yesterday)

   "Best available" = not blocked + lowest fairness score for that shift type.
   Fairness score carries across months via history.

   Leave requests: ONLY approved if that person's shift for that day
   can be covered by someone else (i.e. they are NOT the only one available).
   If they are the only one → leave is REJECTED (coverage wins always).
══════════════════════════════════════════════════════ */

function initF(){return{Π:0,Α:0,Ν:0,WE:0,HOL:0,denied:0};}

function schedule(members,year,month,reqs,params,prevHistory){
  const days=getDays(year,month);
  const n=members.length;
  if(n<3)return{sched:{},fair:{},lastShifts:{},log:{errors:[],rejected:[]}};

  // carry fairness from prev month
  const fair={};
  members.forEach(m=>{
    fair[m.id]={...(prevHistory?.fair?.[m.id]||initF())};
  });

  // sched[mid][day] = shift string
  const sched={};
  members.forEach(m=>{sched[m.id]={};});

  // STEP A: lock in hard blocks (approved leave / sick)
  // These are REQUESTS — we will validate coverage before accepting
  const hardBlock={}; // mid -> Set of days where they CANNOT work
  members.forEach(m=>{
    hardBlock[m.id]=new Set();
    (reqs[m.id]?.sick||[]).forEach(d=>hardBlock[m.id].add(d));
    // Approved leave: tentative — will be confirmed only if coverage ok
  });

  const log={errors:[],rejected:[]};

  // Helper: fairness score for shift type s
  const fscore=(mid,s)=>{
    const f=fair[mid];
    const base=f[s]||0;
    const total=(f.Π||0)+(f.Α||0)+(f.Ν||0);
    // nights weighted heavier
    return s==='Ν' ? base*2+total : base+total*0.3;
  };

  // Process day by day
  for(let d=1;d<=days;d++){
    const we=isWE(year,month,d);
    const hol=isHol(month,d);

    // Who did Ν yesterday? → must get αα today (absolute rule)
    const mustAA=new Set();
    if(d>1){
      members.forEach(m=>{if(sched[m.id][d-1]==='Ν')mustAA.add(m.id);});
    } else if(prevHistory?.lastShifts){
      members.forEach(m=>{if(prevHistory.lastShifts[m.id]==='Ν')mustAA.add(m.id);});
    }

    // Apply αα immediately for those coming off night
    mustAA.forEach(mid=>{sched[mid][d]='αα';});

    // Who is hard-blocked today (sick + αα)
    const blocked=new Set([...mustAA]);
    members.forEach(m=>{
      if(hardBlock[m.id].has(d))blocked.add(m.id);
    });

    // Who WANTS approved leave today
    const wantLeave=(reqs[m=>''],(reqs),(()=>{
      const wl=[];
      members.forEach(m=>{if((reqs[m.id]?.leave||[]).includes(d)&&!blocked.has(m.id))wl.push(m.id);});
      return wl;
    })());

    // Available pool for shifts = not blocked
    const pool=members.filter(m=>!blocked.has(m.id)&&!sched[m.id][d]);

    // We need exactly 3 workers (Π, Α, Ν) from pool
    if(pool.length<3){
      log.errors.push(`${d}/${month+1}: Μόνο ${pool.length} διαθέσιμοι — αδύνατη πλήρης κάλυψη!`);
    }

    // Assign Π, Α, Ν — one person each, best fairness
    const assignedToday=new Set();

    for(const shiftType of WORK){
      // Candidates: pool members not yet assigned today
      // Exclude leave requesters ONLY if there are enough others
      const allCands=pool.filter(m=>!assignedToday.has(m.id));
      const nonLeaveCands=allCands.filter(m=>!wantLeave.includes(m.id));
      
      // Prefer non-leave candidates; fall back to leave if needed for coverage
      let cands=nonLeaveCands.length>0?nonLeaveCands:allCands;
      
      // Sort by fairness (ascending = deserves it most)
      cands=[...cands].sort((a,b)=>fscore(a.id,shiftType)-fscore(b.id,shiftType));

      if(cands.length===0){
        // Already logged above
        continue;
      }

      const chosen=cands[0];
      sched[chosen.id][d]=shiftType;
      assignedToday.add(chosen.id);

      // If a leave requester was forced to work → reject their leave
      if(wantLeave.includes(chosen.id)){
        log.rejected.push({mid:chosen.id,day:d,reason:'Απαραίτητος για κάλυψη'});
      }

      // Update fairness
      fair[chosen.id][shiftType]=(fair[chosen.id][shiftType]||0)+1;
      if(we)fair[chosen.id].WE=(fair[chosen.id].WE||0)+1;
      if(hol)fair[chosen.id].HOL=(fair[chosen.id].HOL||0)+1;
    }

    // Now handle leave for those NOT assigned to work today
    const rejectedLeaveIds=new Set(log.rejected.filter(r=>r.day===d).map(r=>r.mid));
    
    members.forEach(m=>{
      if(sched[m.id][d])return; // already assigned
      if(mustAA.has(m.id))return; // already αα
      
      // Approved leave?
      if((reqs[m.id]?.leave||[]).includes(d)&&!rejectedLeaveIds.has(m.id)){
        sched[m.id][d]='Ά';
        return;
      }
      // Sick?
      if((reqs[m.id]?.sick||[]).includes(d)){
        sched[m.id][d]='Αν';
        return;
      }
      // Preferred rest?
      if((reqs[m.id]?.prefRest||[]).includes(d)){
        sched[m.id][d]='Ρ';
        return;
      }
      // Default: rest
      sched[m.id][d]='Ρ';
    });
  }

  // Cross-month: record last shift
  const lastShifts={};
  members.forEach(m=>{
    for(let d=days;d>=1;d--){
      if(sched[m.id][d]){lastShifts[m.id]=sched[m.id][d];break;}
    }
  });

  return{sched,fair,lastShifts,log};
}

/* ── Validation ── */
function validate(members,sched,days,month,year,prevLastShifts){
  const errs=[],warns=[];
  for(let d=1;d<=days;d++){
    WORK.forEach(s=>{
      const cnt=members.filter(m=>sched[m.id]?.[d]===s).length;
      if(cnt===0)errs.push(`⛔ ${d}/${month+1}: ΑΚΑΛΥΠΤΗ βάρδια ${SHORT[s]}`);
      if(cnt>1)warns.push(`⚠ ${d}/${month+1}: ${cnt} άτομα σε ${SHORT[s]}`);
    });
    const onLeave=members.filter(m=>['Ά','Αν'].includes(sched[m.id]?.[d])).length;
    if(onLeave>2)warns.push(`⚠ ${d}/${month+1}: ${onLeave} σε άδεια/αναρρ.`);
  }
  members.forEach(m=>{
    for(let d=1;d<days;d++){
      if(sched[m.id]?.[d]==='Ν'&&!['αα','Ρ'].includes(sched[m.id]?.[d+1]))
        errs.push(`⛔ ${m.name}: Νύχτα ${d}/${month+1} χωρίς αδιάθετο`);
    }
    if(prevLastShifts?.[m.id]==='Ν'&&!['αα','Ρ'].includes(sched[m.id]?.[1]))
      errs.push(`⛔ ${m.name}: 1/${month+1} χωρίς αδιάθετο (νύχτα προηγ. μήνα)`);
  });
  return{errs,warns};
}

/* ── Helpers ── */
const lsget=k=>S.get(k);
const lsset=(k,v)=>S.set(k,v);

const Bdg=({s,sm=false})=>{
  const c=COL[s]||{bg:'#f9fafb',tx:'#9ca3af',bd:'#e5e7eb'};
  return <span style={{display:'inline-block',padding:sm?'1px 4px':'2px 7px',borderRadius:3,fontSize:sm?10:11,fontWeight:700,background:c.bg,color:c.tx,border:`1px solid ${c.bd}`,whiteSpace:'nowrap'}}>{sm?s:SHORT[s]}</span>;
};

const Emblem=({sz=48})=>(
  <svg width={sz} height={sz} viewBox="0 0 100 100">
    <polygon points="50,4 92,22 92,62 50,96 8,62 8,22" fill="#003087" stroke="#c9a84c" strokeWidth="3"/>
    <rect x="43" y="14" width="14" height="68" fill="white" opacity=".9"/>
    <rect x="14" y="38" width="72" height="14" fill="white" opacity=".9"/>
    <circle cx="50" cy="50" r="9" fill="#c9a84c"/>
    <polygon points="50,39 53,47 62,47 55,53 58,62 50,56 42,62 45,53 38,47 47,47" fill="#003087"/>
  </svg>
);
const Flag=()=>(
  <svg width={42} height={28} viewBox="0 0 90 60">
    {[0,1,2,3,4,5,6,7,8].map(i=><rect key={i} x="0" y={i*6.67} width="90" height="6.67" fill={i%2===0?'#003087':'white'}/>)}
    <rect x="0" y="0" width="36" height="40" fill="#003087"/>
    <rect x="14" y="0" width="8" height="40" fill="white"/>
    <rect x="0" y="16" width="36" height="8" fill="white"/>
  </svg>
);

/* ══ APP ══ */
function App(){
  const T=new Date();
  const [yr,setYr]=useState(T.getFullYear());
  const [mo,setMo]=useState(T.getMonth());
  const [members,setMembers]=useState(()=>lsget('elas_mbr')||[]);
  const [sched,setSched]=useState({});
  const [reqs,setReqs]=useState({});
  const [history,setHistory]=useState(()=>lsget('elas_hist')||{});
  const [tab,setTab]=useState('schedule');
  const [cell,setCell]=useState(null);
  const [newName,setNewName]=useState('');
  const [newRank,setNewRank]=useState(RANKS[0]);
  const [reqM,setReqM]=useState(null);
  const [reqTab,setReqTab]=useState('leave');
  const [msg,setMsg]=useState('');

  const mk=mkey(yr,mo);
  const pmk=pmkey(yr,mo);
  const days=getDays(yr,mo);
  const prevHist=history[pmk]||null;

  useEffect(()=>{
    setSched(lsget(`elas_s_${mk}`)||{});
    setReqs(lsget(`elas_r_${mk}`)||{});
  },[mk]);

  const flash=t=>{setMsg(t);setTimeout(()=>setMsg(''),2500)};
  const saveSched=s=>{lsset(`elas_s_${mk}`,s);flash('Αποθηκεύτηκε ✓')};
  const saveHist=h=>{lsset('elas_hist',h)};

  const generate=()=>{
    const res=schedule(members,yr,mo,reqs,{},prevHist);
    setSched(res.sched);
    lsset(`elas_s_${mk}`,res.sched);
    const nh={...history,[mk]:{fair:res.fair,lastShifts:res.lastShifts,log:res.log}};
    setHistory(nh);saveHist(nh);
    const rej=res.log.rejected.length;
    const err=res.log.errors.length;
    flash(`Πρόγραμμα OK${rej?` | ${rej} απορρ. άδειες`:''}${err?` | ⛔ ${err} σφάλμ.`:''}`);
  };

  const clearSched=()=>{setSched({});lsset(`elas_s_${mk}`,{});flash('Καθαρίστηκε')};

  const getS=(mid,d)=>sched[mid]?.[d]||'';

  const setS=(mid,d,val)=>{
    const ns={...sched,[mid]:{...(sched[mid]||{}),[d]:val||undefined}};
    if(!val)delete ns[mid][d];
    setSched(ns);saveSched(ns);setCell(null);
  };

  const addMember=()=>{
    const name=newName.trim();if(!name)return;
    const m=[...members,{id:Date.now().toString(),name,rank:newRank}];
    setMembers(m);lsset('elas_mbr',m);setNewName('');
  };
  const remMember=id=>{const m=members.filter(x=>x.id!==id);setMembers(m);lsset('elas_mbr',m)};

  const toggleReq=(mid,day,type)=>{
    const cur=reqs[mid]||{leave:[],sick:[],prefRest:[]};
    const list=[...(cur[type]||[])];
    const idx=list.indexOf(day);
    if(idx===-1)list.push(day);else list.splice(idx,1);
    list.sort((a,b)=>a-b);
    const nr={...reqs,[mid]:{...cur,[type]:list}};
    setReqs(nr);lsset(`elas_r_${mk}`,nr);
  };
  const hasReq=(mid,d,t)=>(reqs[mid]?.[t]||[]).includes(d);

  const getStats=mid=>{
    const c={Π:0,Α:0,Ν:0,αα:0,Ρ:0,Ά:0,Αν:0,WE:0,HOL:0};
    for(let d=1;d<=days;d++){
      const s=getS(mid,d);
      if(s&&c[s]!==undefined)c[s]++;
      if(WORK.includes(s)){
        if(isWE(yr,mo,d))c.WE++;
        if(isHol(mo,d))c.HOL++;
      }
    }
    c.total=c.Π+c.Α+c.Ν;
    return c;
  };

  const {errs,warns}=useMemo(()=>{
    if(!Object.keys(sched).length)return{errs:[],warns:[]};
    return validate(members,sched,days,mo,yr,prevHist?.lastShifts);
  },[sched,members,days,mo,yr,prevHist]);

  // Coverage row data
  const coverage=useMemo(()=>{
    const cov={};
    for(let d=1;d<=days;d++){
      cov[d]={};
      WORK.forEach(s=>{cov[d][s]=members.filter(m=>getS(m.id,d)===s).map(m=>m.name.split(' ')[0]);});
      cov[d].ok=WORK.every(s=>cov[d][s].length===1);
    }
    return cov;
  },[sched,members,days]);

  const prevM=()=>{if(mo===0){setMo(11);setYr(y=>y-1)}else setMo(m=>m-1)};
  const nextM=()=>{if(mo===11){setMo(0);setYr(y=>y+1)}else setMo(m=>m+1)};

  useEffect(()=>{
    const h=()=>setCell(null);
    document.addEventListener('click',h);
    return()=>document.removeEventListener('click',h);
  },[]);

  // Log for current month
  const curLog=history[mk]?.log||null;
  const rejLog=curLog?.rejected||[];
  const rejByMember={};
  rejLog.forEach(r=>{if(!rejByMember[r.mid])rejByMember[r.mid]=[];rejByMember[r.mid].push(r.day);});

  const TABS=[['schedule','📋 Πρόγραμμα'],['requests','📝 Αιτήσεις'],['stats','📊 Στατιστικά'],['fairness','⚖️ Δικαιοσύνη'],['settings','⚙️ Ρυθμίσεις']];

  return(
  <div style={{minHeight:'100vh',background:'#eef0f4'}}>

    {/* HEADER */}
    <div style={{background:'#003087',borderBottom:'4px solid #c9a84c'}}>
      <div style={{height:4,background:'repeating-linear-gradient(90deg,#003087 0,#003087 20px,white 20px,white 23px)',opacity:.3}}/>
      <div style={{padding:'11px 16px',display:'flex',alignItems:'center',gap:14,flexWrap:'wrap'}}>
        <Emblem sz={50}/>
        <div style={{flex:1}}>
          <div style={{fontSize:9,color:'#93b4d8',letterSpacing:3,textTransform:'uppercase',marginBottom:1}}>Ελληνική Δημοκρατία • Ελληνική Αστυνομία</div>
          <div style={{fontSize:16,fontWeight:700,color:'white',letterSpacing:.5}}>Πρόγραμμα Βάρδιας Αστυφυλάκων</div>
          <div style={{fontSize:10,color:'#c9a84c',marginTop:1}}>Αυτόματος Προγραμματισμός — Εγγυημένη Κάλυψη Υπηρεσιών</div>
        </div>
        <Flag/>
      </div>
      <div style={{background:'rgba(0,0,0,.22)',padding:'7px 16px',display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:8}}>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <button onClick={prevM} style={{background:'rgba(255,255,255,.15)',border:'1px solid rgba(255,255,255,.3)',color:'white',padding:'3px 10px',borderRadius:3,cursor:'pointer',fontSize:14,fontWeight:700}}>‹</button>
          <span style={{color:'white',fontWeight:700,fontSize:13,minWidth:155,textAlign:'center'}}>{MONTHS[mo].toUpperCase()} {yr}</span>
          <button onClick={nextM} style={{background:'rgba(255,255,255,.15)',border:'1px solid rgba(255,255,255,.3)',color:'white',padding:'3px 10px',borderRadius:3,cursor:'pointer',fontSize:14,fontWeight:700}}>›</button>
          <span style={{fontSize:10,color:prevHist?'#86efac':'#fcd34d',marginLeft:4}}>{prevHist?'✓ Ιστορικό προηγ. μήνα':'⚠ Χωρίς ιστορικό'}</span>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          {msg&&<span style={{color:'#86efac',fontSize:11,fontWeight:700,background:'rgba(0,0,0,.3)',padding:'2px 8px',borderRadius:3}}>{msg}</span>}
        </div>
      </div>
    </div>

    {/* TABS */}
    <div style={{background:'white',borderBottom:'1px solid #d1d5db',boxShadow:'0 1px 2px rgba(0,0,0,.06)'}}>
      <div style={{display:'flex',overflowX:'auto',paddingLeft:8}}>
        {TABS.map(([id,lbl])=><button key={id} onClick={()=>setTab(id)} className={`tab-btn${tab===id?' active':''}`}>{lbl}</button>)}
      </div>
    </div>

    <div style={{padding:14,maxWidth:1600,margin:'0 auto'}}>

      {/* ALERTS */}
      {errs.length>0&&(

            </div>
            <div className="card">
              <div className="sec">Πίνακας Δικαιοσύνης — {MONTHS[mo]} {yr}</div>
              <div style={{overflowX:'auto'}}>
                <table style={{borderCollapse:'collapse',width:'100%',fontSize:11}}>
                  <thead>
                    <tr style={{background:'#f8fafc'}}>
                      {['Αστυφύλακας','Νύχτες','Πρωινές','Απογ/νές','ΣΚ','Αργίες','Απορρ.'].map(h=>(
                        <th key={h} style={{padding:'7px 10px',textAlign:h==='Αστυφύλακας'?'left':'center',fontWeight:700,color:'#003087',borderBottom:'2px solid #003087'}}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {members.slice().sort((a,b)=>(cf[b.id]?.Ν||0)-(cf[a.id]?.Ν||0)).map((m,i)=>{
                      const f=cf[m.id]||initF();
                      return(
                        <tr key={m.id} style={{background:i%2===0?'#fff':'#f8fafc'}}>
                          <td style={{padding:'7px 10px',fontWeight:700,color:'#003087',borderBottom:'1px solid #e5e7eb'}}>{m.name}</td>
                          {[f.Ν||0,f.Π||0,f.Α||0,f.WE||0,f.HOL||0,f.denied||0].map((v,vi)=>(
                            <td key={vi} style={{padding:'7px 8px',textAlign:'center',borderBottom:'1px solid #e5e7eb',fontWeight:700,
                              color:vi===5&&v>0?'#dc2626':vi===0&&v===Math.max(...members.map(m2=>cf[m2.id]?.Ν||0))?'#7c3aed':'#1a1a2e'}}>{v}</td>
                          ))}
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
              <div style={{marginTop:8,fontSize:10,color:'#6b7280'}}>Ταξινόμηση: περισσότερες νύχτες πρώτα | Μωβ = μέγιστο νυχτών | Κόκκινο = απορριφθέντα αιτήματα</div>
            </div>
          </div>
        );
      })()}

      {/* ══ SETTINGS ══ */}
      {tab==='settings'&&(
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(320px,1fr))',gap:14}}>
          <div className="card">
            <div className="sec">👥 Προσωπικό</div>
            <div style={{display:'flex',flexDirection:'column',gap:6,marginBottom:12}}>
              {members.map(m=>(
                <div key={m.id} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'8px 10px',borderRadius:4,background:'#f8fafc',border:'1px solid #e5e7eb'}}>
                  <div><div style={{fontWeight:700,fontSize:12,color:'#003087'}}>{m.name}</div><div style={{fontSize:10,color:'#6b7280'}}>{m.rank}</div></div>
                  <button onClick={()=>remMember(m.id)} className="dbtn" style={{padding:'3px 10px',fontSize:11}}>Αφαίρεση</button>
                </div>
              ))}
              {!members.length&&<div style={{color:'#9ca3af',fontSize:12,textAlign:'center',padding:12}}>Κανένας.</div>}
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr auto',gap:6,marginBottom:6}}>
              <input className="inp" value={newName} onChange={e=>setNewName(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addMember()} placeholder="Ονοματεπώνυμο..."/>
              <button onClick={addMember} className="pbtn">+ Προσθήκη</button>
            </div>
            <select className="sel" style={{width:'100%'}} value={newRank} onChange={e=>setNewRank(e.target.value)}>
              {RANKS.map(r=><option key={r}>{r}</option>)}
            </select>
            {members.length<3&&members.length>0&&(
              <div style={{marginTop:10,padding:'6px 10px',borderRadius:4,background:'#fef2f2',border:'1px solid #fca5a5',fontSize:11,color:'#991b1b',fontWeight:700}}>
                ⛔ Απαιτούνται τουλάχιστον 3 αστυφύλακες για κάλυψη 3 βαρδιών/ημέρα
              </div>
            )}
          </div>

          <div className="card">
            <div className="sec">📅 Ιστορικό & Export</div>
            <div style={{fontSize:11,color:'#4b5563',marginBottom:10,lineHeight:1.6}}>
              Αποθηκεύεται σε <strong>localStorage</strong>. Export σε JSON για backup.
            </div>
            {Object.keys(history).length>0?(
              <div style={{display:'flex',flexDirection:'column',gap:4,marginBottom:12}}>
                {Object.keys(history).sort().reverse().slice(0,8).map(k=>(
                  <div key={k} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'5px 10px',borderRadius:4,background:'#f8fafc',border:'1px solid #e5e7eb',fontSize:11}}>
                    <span style={{fontWeight:700,color:'#003087'}}>{k}</span>
                    <span style={{color:'#6b7280',fontSize:10}}>{history[k].log?.rejected?.length||0} απορρ.</span>
                    {k===mk&&<span style={{fontSize:9,background:'#dcfce7',color:'#14532d',border:'1px solid #86efac',borderRadius:2,padding:'1px 5px'}}>Τρέχων</span>}
                  </div>
                ))}
              </div>
            ):<div style={{color:'#9ca3af',fontSize:12,marginBottom:12}}>Κανένα ιστορικό ακόμα.</div>}
            <div style={{display:'flex',gap:6}}>
              <button onClick={()=>{
                const d=JSON.stringify({members,history},null,2);
                const a=document.createElement('a');a.href='data:application/json,'+encodeURIComponent(d);
                a.download=`elas_${new Date().toISOString().slice(0,10)}.json`;a.click();
              }} className="gbtn" style={{fontSize:11,flex:1}}>⬇ Export JSON</button>
              <label style={{flex:1,cursor:'pointer'}}>
                <input type="file" accept=".json" style={{display:'none'}} onChange={e=>{
                  const f=e.target.files[0];if(!f)return;
                  const r=new FileReader();
                  r.onload=ev=>{try{
                    const d=JSON.parse(ev.target.result);
                    if(d.members){setMembers(d.members);lsset('elas_mbr',d.members);}
                    if(d.history){setHistory(d.history);saveHist(d.history);}
                    flash('Import επιτυχές ✓');
                  }catch{flash('Σφάλμα import');}};
                  r.readAsText(f);
                }}/>
                <span className="gbtn" style={{fontSize:11,display:'block',textAlign:'center'}}>⬆ Import JSON</span>
              </label>
            </div>
          </div>

          <div className="card">
            <div className="sec">📋 Κανονισμός (Σύνοψη)</div>
            <div style={{fontSize:11,color:'#374151',lineHeight:1.8}}>
              {[['⛔','Υποχρεωτικό','Πρωί+Απόγ.+Νύχτα ΠΑΝΤΑ καλυμμένα • αα μετά Νύχτα'],['⚠','Αδιαπραγμάτευτο','Αδεία χορηγείται ΜΟΝΟ αν υπάρχει κάλυψη'],['⚖','Δικαιοσύνη','Ισοκατανομή νυχτών, ΣΚ, αργιών — με μνήμη μεταξύ μηνών'],['📅','Cross-month','Ο νέος μήνας συνεχίζει από τον προηγούμενο']].map(([ic,t,d])=>(
                <div key={t} style={{display:'flex',gap:8,marginBottom:5,padding:'5px 8px',borderRadius:4,background:'#f8fafc',border:'1px solid #e5e7eb'}}>
                  <span>{ic}</span><div><strong style={{color:'#003087'}}>{t}:</strong> {d}</div>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}

      <div style={{marginTop:20,paddingTop:12,borderTop:'1px solid #d1d5db',display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:8}}>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <Emblem sz={22}/>
          <div><div style={{fontSize:10,fontWeight:700,color:'#003087'}}>Ελληνική Αστυνομία — ΕΛ.ΑΣ.</div><div style={{fontSize:9,color:'#9ca3af'}}>Σύστημα Αυτόματου Προγραμματισμού Βαρδιών v6.0</div></div>
        </div>
        <div style={{fontSize:9,color:'#9ca3af'}}>🔒 Εμπιστευτικό — Εσωτερική Χρήση</div>
      </div>
    </div>
  </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
