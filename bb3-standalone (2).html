<script type="text/babel">
const {useState,useEffect,useCallback,useMemo}=React;

/* ═══════════════════════════════════════════
   CONSTANTS
═══════════════════════════════════════════ */
const SHIFT_TYPES=['Π','Α','Ν'];
const ALL_STATES=['Π','Α','Ν','αα','Ρ','Ά','Αν','—'];
const LABELS={Π:'Πρωί (06-14)',Α:'Απόγευμα (14-22)',Ν:'Νύχτα (22-06)',αα:'Αδιάθετο',Ρ:'Ρεπό',Ά:'Άδεια',Αν:'Αναρρωτική','—':'Κενό'};
const SHORT={Π:'Πρωί',Α:'Απόγ.',Ν:'Νύχτα',αα:'αα',Ρ:'Ρεπό',Ά:'Άδεια',Αν:'Αναρρ.','—':'—'};
const COLORS={
  Π:{bg:'#dbeafe',tx:'#1e3a8a',bd:'#93c5fd'},
  Α:{bg:'#fef3c7',tx:'#78350f',bd:'#fcd34d'},
  Ν:{bg:'#1e1b4b',tx:'#c7d2fe',bd:'#4338ca'},
  αα:{bg:'#f3e8ff',tx:'#581c87',bd:'#c4b5fd'},
  Ρ:{bg:'#dcfce7',tx:'#14532d',bd:'#86efac'},
  Ά:{bg:'#fee2e2',tx:'#7f1d1d',bd:'#fca5a5'},
  Αν:{bg:'#ffedd5',tx:'#7c2d12',bd:'#fb923c'},
  '—':{bg:'#f9fafb',tx:'#9ca3af',bd:'#e5e7eb'},
};
const MONTH_N=['Ιανουάριος','Φεβρουάριος','Μάρτιος','Απρίλιος','Μάιος','Ιούνιος','Ιούλιος','Αύγουστος','Σεπτέμβριος','Οκτώβριος','Νοέμβριος','Δεκέμβριος'];
const DAY_N=['ΚΥΡ','ΔΕΥ','ΤΡΙ','ΤΕΤ','ΠΕΜ','ΠΑΡ','ΣΑΒ'];
const RANKS=['Αστυφύλακας','Αρχιφύλακας','Υπαρχιφύλακας','Ανθυπαστυνόμος','Υπαστυνόμος Β\'','Υπαστυνόμος Α\''];
const DEFAULT_PARAMS={
  staffPerShift:1,
  minRestHours:11,        // min hours between shifts
  maxConsecShifts:5,      // max consecutive work days
  maxNightsPerMonth:10,
  maxNightsPerWeek:3,
  maxLeavesSimult:2,
  weekendWeight:1.5,      // fairness multiplier for weekends
};
const GR_HOLIDAYS_2025=['2025-01-01','2025-01-06','2025-03-25','2025-04-18','2025-04-20','2025-04-21','2025-05-01','2025-06-09','2025-08-15','2025-10-28','2025-12-25','2025-12-26'];

/* ═══════════════════════════════════════════
   STORAGE (cookies + localStorage fallback)
═══════════════════════════════════════════ */
const store={
  set(k,v){
    const s=JSON.stringify(v);
    try{localStorage.setItem(k,s)}catch{}
    try{
      const d=new Date();d.setFullYear(d.getFullYear()+2);
      document.cookie=`${encodeURIComponent(k)}=${encodeURIComponent(s)};expires=${d.toUTCString()};path=/;SameSite=Strict`;
    }catch{}
  },
  get(k){
    try{const v=localStorage.getItem(k);if(v)return JSON.parse(v)}catch{}
    try{
      const name=encodeURIComponent(k)+'=';
      const c=document.cookie.split(';');
      for(let i=0;i<c.length;i++){
        let cv=c[i].trim();
        if(cv.startsWith(name))return JSON.parse(decodeURIComponent(cv.substring(name.length)));
      }
    }catch{}
    return null;
  }
};

/* ═══════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════ */
const getDays=(y,m)=>new Date(y,m+1,0).getDate();
const mkey=(y,m)=>`${y}-${String(m+1).padStart(2,'0')}`;
const pmkey=(y,m)=>m===0?mkey(y-1,11):mkey(y,m-1);
const dateStr=(y,m,d)=>`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
const isWeekend=d=>[0,6].includes(d);
const isHoliday=(y,m,d)=>GR_HOLIDAYS_2025.includes(dateStr(y,m,d));
const getDow=(y,m,d)=>new Date(y,m,d).getDay();

function shiftHours(s){
  if(s==='Π')return{start:6,end:14};
  if(s==='Α')return{start:14,end:22};
  if(s==='Ν')return{start:22,end:30}; // +24 for comparison
  return null;
}
function hoursGap(s1,s2){
  // hours between end of s1 and start of s2
  const h1=shiftHours(s1),h2=shiftHours(s2);
  if(!h1||!h2)return 999;
  return h2.start-h1.end; // can be negative if wraps
}

/* ═══════════════════════════════════════════
   FAIRNESS SCORING
   Each officer accumulates a score per category.
   Lower score = higher priority for next assignment.
═══════════════════════════════════════════ */
function initFairness(){
  return{Π:0,Α:0,Ν:0,weekend:0,holiday:0,denied:0,satisfied:0};
}
function mergeFairness(a,b){
  const r={};
  Object.keys(a).forEach(k=>{r[k]=(a[k]||0)+(b[k]||0)});
  return r;
}
// Priority score: lower = deserves more
function priorityScore(f,params){
  return (f.Ν*3)+(f.Π)+(f.Α)+(f.weekend*params.weekendWeight)+(f.holiday*2)-(f.denied*0.5);
}

/* ═══════════════════════════════════════════
   CONSTRAINT CHECKER
═══════════════════════════════════════════ */
function canWork(mid,day,shiftType,sched,prevMonthLastShift,params,members,year,month){
  const days=getDays(year,month);
  const getS=(d)=>d<1?prevMonthLastShift?.[mid]??null:sched[mid]?.[d]??null;

  const cur=sched[mid]?.[day]??null;
  // Already has a state assigned (blocked days)
  if(cur==='αα'||cur==='Ρ'||cur==='Ά'||cur==='Αν')return{ok:false,reason:`Ήδη: ${LABELS[cur]}`};
  // Post-night: if yesterday was Ν or αα follows Ν
  const prev=getS(day-1);
  if(prev==='Ν')return{ok:false,reason:'Αδιάθετο μετά νύχτα'};
  // Min rest hours between shifts
  if(prev&&SHIFT_TYPES.includes(prev)){
    const gap=hoursGap(prev,shiftType);
    if(gap<params.minRestHours&&gap>-12)
      return{ok:false,reason:`Ελάχιστη ανάπαυση ${params.minRestHours}ω (κενό: ${gap}ω)`};
  }
  // Max consecutive work days
  let consec=0;
  for(let d=day-1;d>=Math.max(1,day-params.maxConsecShifts);d--){
    const s=getS(d);
    if(s&&SHIFT_TYPES.includes(s))consec++;else break;
  }
  if(consec>=params.maxConsecShifts)return{ok:false,reason:`Μέγ. ${params.maxConsecShifts} συνεχόμενες βάρδιες`};
  // Max nights per month
  if(shiftType==='Ν'){
    const nightsSoFar=Object.values(sched[mid]||{}).filter(s=>s==='Ν').length;
    if(nightsSoFar>=params.maxNightsPerMonth)return{ok:false,reason:`Μέγ. ${params.maxNightsPerMonth} νύχτες/μήνα`};
    // Max nights per week
    const dow=getDow(year,month,day);
    const weekStart=day-dow;
    let weekNights=0;
    for(let d=weekStart;d<day;d++){if(d>=1&&sched[mid]?.[d]==='Ν')weekNights++}
    if(weekNights>=params.maxNightsPerWeek)return{ok:false,reason:`Μέγ. ${params.maxNightsPerWeek} νύχτες/εβδ.`};
  }
  return{ok:true};
}

/* ═══════════════════════════════════════════
   MAIN SCHEDULER
═══════════════════════════════════════════ */
function generateSchedule(members,year,month,requests,params,prevData){
  const days=getDays(year,month);
  const prevMonthLastShift=prevData?.lastShifts??{};
  const prevFairness=prevData?.fairness??{};

  // Init schedule: fill forced states from requests
  const sched={};
  members.forEach(m=>{sched[m.id]={};});

  // Fairness per officer (carry from prev month)
  const fair={};
  members.forEach(m=>{
    fair[m.id]=prevFairness[m.id]?{...prevFairness[m.id]}:initFairness();
  });

  // Rejected/satisfied log
  const log={rejected:[],satisfied:[]};

  // PASS 1: Apply hard-blocked days (approved leaves, sick, mandatory rest)
  members.forEach(m=>{
    const req=requests[m.id]||{};
    (req.leave||[]).forEach(d=>{sched[m.id][d]='Ά'});
    (req.sick||[]).forEach(d=>{sched[m.id][d]='Αν'});
  });

  // PASS 2: For each day, assign Π, Α, Ν
  for(let d=1;d<=days;d++){
    const dow=getDow(year,month,d);
    const wknd=isWeekend(dow);
    const hol=isHoliday(year,month,d);

    // For each shift type, find best candidate
    for(const shiftType of SHIFT_TYPES){
      // Check if already covered (manual or pre-assigned)
      const alreadyCovered=members.some(m=>sched[m.id]?.[d]===shiftType);
      if(alreadyCovered)continue;

      // Find eligible members sorted by priority
      const eligible=members
        .filter(m=>{
          const c=canWork(m.id,d,shiftType,sched,prevMonthLastShift,params,members,year,month);
          return c.ok;
        })
        .sort((a,b)=>{
          // Check preference
          const prefA=(requests[a.id]?.prefShift||[]).includes(shiftType)?-1:0;
          const prefB=(requests[b.id]?.prefShift||[]).includes(shiftType)?-1:0;
          if(prefA!==prefB)return prefA-prefB;
          // Fairness score
          const fa=fair[a.id]||initFairness();
          const fb=fair[b.id]||initFairness();
          const scoreA=priorityScore(fa,params)+(fa[shiftType]||0)*2;
          const scoreB=priorityScore(fb,params)+(fb[shiftType]||0)*2;
          return scoreA-scoreB;
        });

      if(eligible.length===0){
        // No one available — log critical
        log.rejected.push({day:d,shift:shiftType,reason:'Κανένας διαθέσιμος'});
        continue;
      }

      const chosen=eligible[0];
      sched[chosen.id][d]=shiftType;

      // Update fairness
      fair[chosen.id][shiftType]=(fair[chosen.id][shiftType]||0)+1;
      if(wknd)fair[chosen.id].weekend=(fair[chosen.id].weekend||0)+1;
      if(hol)fair[chosen.id].holiday=(fair[chosen.id].holiday||0)+1;

      // Was this their preferred shift?
      if((requests[chosen.id]?.prefShift||[]).includes(shiftType)){
        log.satisfied.push({mid:chosen.id,day:d,shift:shiftType,type:'prefShift'});
      }
    }

    // PASS 2b: post-night → αα
    members.forEach(m=>{
      if(sched[m.id][d]==='Ν'){
        if(d<days)sched[m.id][d+1]='αα';
      }
    });
  }

  // PASS 3: preferred rest days (Ρ) — only if day is unassigned
  members.forEach(m=>{
    const req=requests[m.id]||{};
    (req.prefRest||[]).forEach(d=>{
      if(!sched[m.id][d]){
        sched[m.id][d]='Ρ';
        log.satisfied.push({mid:m.id,day:d,type:'prefRest'});
      } else {
        log.rejected.push({mid:m.id,day:d,type:'prefRest',reason:'Ήδη ανατεθειμένη'});
        fair[m.id].denied=(fair[m.id].denied||0)+1;
      }
    });
  });

  // PASS 4: fill remaining blanks with Ρ
  members.forEach(m=>{
    for(let d=1;d<=days;d++){
      if(!sched[m.id][d])sched[m.id][d]='Ρ';
    }
  });

  // Compute last shifts for cross-month
  const lastShifts={};
  members.forEach(m=>{
    for(let d=days;d>=1;d--){
      const s=sched[m.id][d];
      if(s&&SHIFT_TYPES.includes(s)){lastShifts[m.id]=s;break;}
      if(s==='αα'){lastShifts[m.id]='αα';break;}
    }
  });

  return{sched,fairness:fair,lastShifts,log};
}

/* ═══════════════════════════════════════════
   VALIDATION
═══════════════════════════════════════════ */
function validateSchedule(members,sched,days,month,year,params,prevLastShifts){
  const errs=[];
  const warns=[];

  for(let d=1;d<=days;d++){
    SHIFT_TYPES.forEach(s=>{
      const cnt=members.filter(m=>sched[m.id]?.[d]===s).length;
      if(cnt<params.staffPerShift)errs.push(`${d}/${month+1}: ΑΚΑΛΥΠΤΗ βάρδια ${SHORT[s]} (${cnt}/${params.staffPerShift})`);
      if(cnt>params.staffPerShift)warns.push(`${d}/${month+1}: Υπέρ-κάλυψη ${SHORT[s]} (${cnt})`);
    });
    const onLeave=members.filter(m=>['Ά','Αν'].includes(sched[m.id]?.[d])).length;
    if(onLeave>params.maxLeavesSimult)errs.push(`${d}/${month+1}: ${onLeave} σε άδεια (max ${params.maxLeavesSimult})`);
  }

  members.forEach(m=>{
    const prev=prevLastShifts?.[m.id];
    if(prev==='Ν'&&sched[m.id]?.[1]!=='αα'&&sched[m.id]?.[1]!=='Ρ')
      errs.push(`${m.name}: 1/${month+1} χωρίς αδιάθετο μετά νύχτα προηγ. μήνα`);
    for(let d=1;d<days;d++){
      if(sched[m.id]?.[d]==='Ν'&&!['αα','Ρ'].includes(sched[m.id]?.[d+1]))
        errs.push(`${m.name}: Νύχτα ${d}/${month+1} χωρίς αδιάθετο`);
    }
    // Check max nights
    const nights=Object.values(sched[m.id]||{}).filter(s=>s==='Ν').length;
    if(nights>params.maxNightsPerMonth)warns.push(`${m.name}: ${nights} νύχτες (max ${params.maxNightsPerMonth})`);
  });

  return{errs,warns};
}

/* ═══════════════════════════════════════════
   APP
═══════════════════════════════════════════ */
function App(){
  const today=new Date();
  const [yr,setYr]=useState(today.getFullYear());
  const [mo,setMo]=useState(today.getMonth());
  const [members,setMembers]=useState(()=>store.get('elas_members')||[]);
  const [sched,setSched]=useState({});
  const [requests,setRequests]=useState({});
  const [params,setParams]=useState(()=>store.get('elas_params')||DEFAULT_PARAMS);
  const [history,setHistory]=useState(()=>store.get('elas_history')||{});// {mkey:{fairness,lastShifts,log}}
  const [tab,setTab]=useState('schedule');
  const [activeCell,setActiveCell]=useState(null);
  const [newName,setNewName]=useState('');
  const [newRank,setNewRank]=useState(RANKS[0]);
  const [reqMember,setReqMember]=useState(null);
  const [reqTab,setReqTab]=useState('leave');
  const [saveMsg,setSaveMsg]=useState('');
  const [genLog,setGenLog]=useState(null);
  const [paramEdit,setParamEdit]=useState(false);
  const [localParams,setLocalParams]=useState(params);

  const mk=mkey(yr,mo);
  const pmk2=pmkey(yr,mo);
  const days=getDays(yr,mo);
  const prevData=history[pmk2]||null;

  // Load month data
  useEffect(()=>{
    setSched(store.get(`elas_sched_${mk}`)||{});
    setRequests(store.get(`elas_req_${mk}`)||{});
    setGenLog(store.get(`elas_log_${mk}`)||null);
  },[mk]);

  const flash=msg=>{setSaveMsg(msg||'Αποθηκεύτηκε ✓');setTimeout(()=>setSaveMsg(''),2500)};

  const saveSched=s=>{store.set(`elas_sched_${mk}`,s);flash()};
  const saveReq=r=>store.set(`elas_req_${mk}`,r);
  const saveMembers=m=>store.set('elas_members',m);
  const saveParams=p=>store.set('elas_params',p);
  const saveHistory=h=>store.set('elas_history',h);

  const generate=()=>{
    const res=generateSchedule(members,yr,mo,requests,params,prevData);
    setSched(res.sched);
    store.set(`elas_sched_${mk}`,res.sched);
    setGenLog(res.log);
    store.set(`elas_log_${mk}`,res.log);
    // Save to history
    const nh={...history,[mk]:{fairness:res.fairness,lastShifts:res.lastShifts,log:res.log}};
    setHistory(nh);
    saveHistory(nh);
    flash(`Πρόγραμμα δημιουργήθηκε (${Object.values(res.sched).flatMap(Object.values).filter(s=>SHIFT_TYPES.includes(s)).length} βάρδιες)`);
  };

  const clearSched=()=>{
    setSched({});store.set(`elas_sched_${mk}`,{});setGenLog(null);store.set(`elas_log_${mk}`,null);flash('Καθαρίστηκε');
  };

  const getShift=(mid,d)=>sched[mid]?.[d]??'';

  const setShift=(mid,d,val)=>{
    const ns={...sched,[mid]:{...(sched[mid]||{}),[d]:val||undefined}};
    if(!val){delete ns[mid][d];}
    setSched(ns);saveSched(ns);setActiveCell(null);
  };

  const addMember=()=>{
    const name=newName.trim();if(!name)return;
    const m=[...members,{id:Date.now().toString(),name,rank:newRank}];
    setMembers(m);saveMembers(m);setNewName('');
  };

  const removeMember=id=>{
    const m=members.filter(x=>x.id!==id);setMembers(m);saveMembers(m);
  };

  // Requests helpers
  const toggleReqDay=(mid,day,type)=>{
    const cur=requests[mid]||{leave:[],sick:[],prefRest:[],prefShift:[]};
    const list=[...(cur[type]||[])];
    const idx=list.indexOf(day);
    if(idx===-1)list.push(day);else list.splice(idx,1);
    list.sort((a,b)=>a-b);
    const nr={...requests,[mid]:{...cur,[type]:list}};
    setRequests(nr);saveReq(nr);
  };
  const togglePrefShift=(mid,shiftType)=>{
    const cur=requests[mid]||{leave:[],sick:[],prefRest:[],prefShift:[]};
    const list=[...(cur.prefShift||[])];
    const idx=list.indexOf(shiftType);
    if(idx===-1)list.push(shiftType);else list.splice(idx,1);
    const nr={...requests,[mid]:{...cur,prefShift:list}};
    setRequests(nr);saveReq(nr);
  };
  const hasReq=(mid,day,type)=>(requests[mid]?.[type]||[]).includes(day);

  // Validation
  const {errs,warns}=useMemo(()=>{
    if(!Object.keys(sched).length)return{errs:[],warns:[]};
    return validateSchedule(members,sched,days,mo,yr,params,prevData?.lastShifts);
  },[sched,members,days,mo,yr,params,prevData]);

  // Stats
  const getStats=mid=>{
    const c={Π:0,Α:0,Ν:0,αα:0,Ρ:0,Ά:0,Αν:0,weekend:0,holiday:0};
    for(let d=1;d<=days;d++){
      const s=getShift(mid,d);
      if(s&&c[s]!==undefined)c[s]++;
      const dow=getDow(yr,mo,d);
      if(isWeekend(dow)&&SHIFT_TYPES.includes(s))c.weekend++;
      if(isHoliday(yr,mo,d)&&SHIFT_TYPES.includes(s))c.holiday++;
    }
    c.total=c.Π+c.Α+c.Ν;
    return c;
  };

  const prevM=()=>{if(mo===0){setMo(11);setYr(y=>y-1)}else setMo(m=>m-1)};
  const nextM=()=>{if(mo===11){setMo(0);setYr(y=>y+1)}else setMo(m=>m+1)};

  useEffect(()=>{
    const h=()=>setActiveCell(null);
    document.addEventListener('click',h);
    return()=>document.removeEventListener('click',h);
  },[]);

  const TABS=[['schedule','📋 Πρόγραμμα'],['requests','📝 Αιτήσεις'],['stats','📊 Στατιστικά'],['fairness','⚖️ Δικαιοσύνη'],['settings','⚙️ Ρυθμίσεις']];

  const hasSched=Object.keys(sched).length>0;

  return(
  <div style={{minHeight:'100vh',background:'#eef0f4'}}>
    {/* ── HEADER ── */}
    <div style={{background:'#003087',borderBottom:'4px solid #c9a84c'}}>
      <div style={{height:5,background:'repeating-linear-gradient(90deg,#003087 0px,#003087 18px,white 18px,white 22px)',opacity:.35}}/>
      <div style={{padding:'12px 16px',display:'flex',alignItems:'center',gap:14,flexWrap:'wrap'}}>
        <PoliceEmblem sz={52}/>
        <div style={{flex:1}}>
          <div style={{fontSize:9,color:'#93b4d8',letterSpacing:3,textTransform:'uppercase',marginBottom:1}}>Ελληνική Δημοκρατία • Ελληνική Αστυνομία</div>
          <div style={{fontSize:16,fontWeight:700,color:'white',letterSpacing:.5}}>Πρόγραμμα Βάρδιας Αστυφυλάκων</div>
          <div style={{fontSize:10,color:'#c9a84c',marginTop:1}}>Σύστημα Διαχείρισης Υπηρεσιακού Προγράμματος — ΕΛ.ΑΣ.</div>
        </div>
        <GrFlag/>
      </div>
      {/* Month nav */}
      <div style={{background:'rgba(0,0,0,.2)',padding:'7px 16px',display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:8}}>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <button onClick={prevM} style={{background:'rgba(255,255,255,.15)',border:'1px solid rgba(255,255,255,.3)',color:'white',padding:'3px 10px',borderRadius:3,cursor:'pointer',fontSize:14,fontWeight:700}}>‹</button>
          <span style={{color:'white',fontWeight:700,fontSize:13,minWidth:155,textAlign:'center',letterSpacing:.5}}>{MONTH_N[mo].toUpperCase()} {yr}</span>
          <button onClick={nextM} style={{background:'rgba(255,255,255,.15)',border:'1px solid rgba(255,255,255,.3)',color:'white',padding:'3px 10px',borderRadius:3,cursor:'pointer',fontSize:14,fontWeight:700}}>›</button>
          {prevData&&<span style={{fontSize:10,color:'#86efac',marginLeft:4}}>✓ Δεδομένα προηγ. μήνα</span>}
          {!prevData&&<span style={{fontSize:10,color:'#fcd34d',marginLeft:4}}>⚠ Χωρίς ιστορικό προηγ. μήνα</span>}
        </div>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          {saveMsg&&<span style={{color:'#86efac',fontSize:11,fontWeight:700,background:'rgba(0,0,0,.3)',padding:'2px 8px',borderRadius:3}}>✓ {saveMsg}</span>}
          <span style={{color:'#93b4d8',fontSize:10}}>{today.toLocaleDateString('el-GR',{weekday:'short',day:'numeric',month:'short',year:'numeric'})}</span>
        </div>
      </div>
    </div>

    {/* ── TABS ── */}
    <div style={{background:'white',borderBottom:'1px solid #d1d5db',boxShadow:'0 1px 2px rgba(0,0,0,.06)'}}>
      <div style={{display:'flex',overflowX:'auto',paddingLeft:8}}>
        {TABS.map(([id,lbl])=><button key={id} onClick={()=>setTab(id)} className={`tab-btn${tab===id?' active':''}`}>{lbl}</button>)}
      </div>
    </div>

    <div style={{padding:14,maxWidth:1500,margin:'0 auto'}}>

      {/* ── Errors/Warns ── */}
      {errs.length>0&&(
        <div style={{marginBottom:10,padding:10,borderRadius:4,background:'#fef2f2',border:'1px solid #fca5a5',borderLeft:'4px solid #dc2626'}}>
          <div style={{color:'#991b1b',fontWeight:700,fontSize:11,marginBottom:5}}>⛔ ΠΑΡΑΒΙΑΣΕΙΣ ΥΠΟΧΡΕΩΤΙΚΩΝ ΚΑΝΟΝΩΝ ({errs.length})</div>
          {errs.map((e,i)=><div key={i} style={{color:'#7f1d1d',fontSize:11,paddingLeft:12}}>• {e}</div>)}
        </div>
      )}
      {warns.length>0&&(
        <div style={{marginBottom:10,padding:10,borderRadius:4,background:'#fffbeb',border:'1px solid #fcd34d',borderLeft:'4px solid #f59e0b'}}>
          <div style={{color:'#92400e',fontWeight:700,fontSize:11,marginBottom:5}}>⚠ ΠΡΟΕΙΔΟΠΟΙΗΣΕΙΣ ({warns.length})</div>
          {warns.map((w,i)=><div key={i} style={{color:'#78350f',fontSize:11,paddingLeft:12}}>• {w}</div>)}
        </div>
      )}

      {/* ════ SCHEDULE ════ */}
      {tab==='schedule'&&(<>
        <div style={{marginBottom:12,display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
          <button onClick={generate} className="pbtn">▶ Αυτόματη Δημιουργία Προγράμματος</button>
          <button onClick={clearSched} className="dbtn">✕ Καθαρισμός</button>
          {genLog&&<span style={{fontSize:11,color:'#14532d',background:'#dcfce7',border:'1px solid #86efac',padding:'4px 10px',borderRadius:3}}>
            ✓ {genLog.satisfied?.length||0} ικανοποιημένα αιτ. | {genLog.rejected?.length||0} απορριφθέντα
          </span>}
        </div>

        {/* Info strip */}
        <div style={{marginBottom:12,padding:'8px 12px',borderRadius:4,background:'#eff6ff',border:'1px solid #bfdbfe',fontSize:11,color:'#1e40af',display:'flex',gap:16,flexWrap:'wrap'}}>
          <span><strong>Κύκλος:</strong> Α → Π → Ν → αα → Ρ → Ρ</span>
          <span><strong>Κάλυψη:</strong> {params.staffPerShift} αστ./βάρδια</span>
          <span><strong>Μέγ. νύχτες:</strong> {params.maxNightsPerMonth}/μήνα, {params.maxNightsPerWeek}/εβδ.</span>
          <span><strong>Ελ. ανάπαυση:</strong> {params.minRestHours}ω</span>
          <span><strong>Μέγ. συν. βάρδιες:</strong> {params.maxConsecShifts}</span>
        </div>

        {members.length===0?(
          <div style={{textAlign:'center',padding:50,background:'white',borderRadius:5,border:'2px dashed #d1d5db'}}>
            <div style={{marginBottom:10,opacity:.25}}><PoliceEmblem sz={60}/></div>
            <div style={{color:'#003087',fontWeight:700,fontSize:15,marginBottom:8}}>Δεν υπάρχουν αστυφύλακες</div>
            <button onClick={()=>setTab('settings')} className="pbtn">Μετάβαση στις Ρυθμίσεις</button>
          </div>
        ):(
          <div style={{overflowX:'auto',borderRadius:5,border:'1px solid #d1d5db',boxShadow:'0 1px 4px rgba(0,0,0,.06)'}}>
            <table style={{borderCollapse:'collapse',minWidth:Math.max(720,180+days*44)}}>
              <thead>
                <tr style={{background:'#003087'}}>
                  <th style={{position:'sticky',left:0,zIndex:15,padding:'9px 12px',textAlign:'left',fontSize:10,letterSpacing:1,color:'white',fontWeight:700,textTransform:'uppercase',background:'#003087',borderBottom:'2px solid #c9a84c',borderRight:'1px solid rgba(255,255,255,.2)',minWidth:175}}>Αστυφύλακας</th>
                  {Array.from({length:days},(_,i)=>i+1).map(d=>{
                    const dow=getDow(yr,mo,d);
                    const wk=isWeekend(dow);
                    const hl=isHoliday(yr,mo,d);
                    const tod=d===today.getDate()&&mo===today.getMonth()&&yr===today.getFullYear();
                    return(
                      <th key={d} style={{padding:'5px 2px',textAlign:'center',minWidth:44,fontSize:9,fontWeight:700,
                        background:tod?'#c9a84c':hl?'#4c1d95':wk?'#1e3a6e':'#003087',
                        color:tod?'#003087':'white',
                        borderBottom:'2px solid #c9a84c',borderRight:'1px solid rgba(255,255,255,.12)'}}>
                        <div>{d}</div>
                        <div style={{fontSize:8,opacity:.75,fontWeight:400}}>{DAY_N[dow]}</div>
                        {hl&&<div style={{fontSize:7,opacity:.8}}>★</div>}
                      </th>
                    );
                  })}
                  <th style={{padding:'9px 6px',textAlign:'center',fontSize:10,color:'#c9a84c',fontWeight:700,background:'#003087',borderBottom:'2px solid #c9a84c',minWidth:48}}>ΣΥΝ.</th>
                </tr>
              </thead>
              <tbody>
                {members.map((m,mi)=>{
                  const st=getStats(m.id);
                  return(
                    <tr key={m.id} style={{background:mi%2===0?'#fff':'#f8fafc'}}>
                      <td style={{position:'sticky',left:0,zIndex:10,padding:'7px 12px',background:mi%2===0?'#fff':'#f8fafc',borderRight:'2px solid #003087',borderBottom:'1px solid #e5e7eb',whiteSpace:'nowrap'}}>
                        <div style={{fontWeight:700,fontSize:12,color:'#003087'}}>{m.name}</div>
                        <div style={{fontSize:10,color:'#6b7280'}}>{m.rank}</div>
                        <div style={{fontSize:9,color:'#9ca3af',marginTop:1}}>Π:{st.Π} Α:{st.Α} Ν:{st.Ν} | ΣΚ:{st.weekend}</div>
                      </td>
                      {Array.from({length:days},(_,i)=>i+1).map(d=>{
                        const s=getShift(m.id,d);
                        const isAct=activeCell?.mid===m.id&&activeCell?.day===d;
                        const dow=getDow(yr,mo,d);
                        const wk=isWeekend(dow);
                        const hl=isHoliday(yr,mo,d);
                        return(
                          <td key={d} style={{padding:'2px',textAlign:'center',cursor:'pointer',position:'relative',
                            borderRight:'1px solid #e5e7eb',borderBottom:'1px solid #e5e7eb',
                            background:hl?'#faf5ff':wk?'#f1f5f9':'transparent',minWidth:44}}
                            onClick={e=>{e.stopPropagation();setActiveCell(isAct?null:{mid:m.id,day:d})}}>
                            {s?<Badge s={s} sm/>:<span style={{color:'#e5e7eb',fontSize:12}}>–</span>}
                            {isAct&&(
                              <div style={{position:'absolute',top:'calc(100% + 3px)',left:'50%',transform:'translateX(-50%)',zIndex:200,
                                background:'white',border:'1px solid #d1d5db',borderRadius:5,padding:8,
                                boxShadow:'0 4px 16px rgba(0,0,0,.18)',minWidth:160}}
                                onClick={e=>e.stopPropagation()}>
                                <div style={{fontSize:9,fontWeight:700,color:'#003087',letterSpacing:1,textTransform:'uppercase',marginBottom:6,borderBottom:'1px solid #e5e7eb',paddingBottom:5}}>Επιλογή — {d}/{mo+1}</div>
                                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:3}}>
                                  {ALL_STATES.filter(x=>x!=='—').map(st2=>(
                                    <button key={st2} onClick={()=>setShift(m.id,d,st2)}
                                      style={{padding:'3px 6px',borderRadius:3,fontSize:11,cursor:'pointer',fontWeight:700,fontFamily:'Arial',
                                        background:COLORS[st2]?.bg||'#f9fafb',color:COLORS[st2]?.tx||'#374151',
                                        border:`1px solid ${COLORS[st2]?.bd||'#d1d5db'}`,
                                        outline:s===st2?'2px solid #003087':'none',outlineOffset:1}}>
                                      {SHORT[st2]}
                                    </button>
                                  ))}
                                  <button onClick={()=>setShift(m.id,d,'')}
                                    style={{gridColumn:'1/-1',padding:'3px 6px',borderRadius:3,fontSize:11,cursor:'pointer',fontWeight:700,fontFamily:'Arial',background:'#f9fafb',border:'1px solid #d1d5db',color:'#6b7280',marginTop:2}}>
                                    ✕ Εκκαθάριση
                                  </button>
                                </div>
                              </div>
                            )}
                          </td>
                        );
                      })}
                      <td style={{padding:'7px 6px',textAlign:'center',fontWeight:700,fontSize:13,color:'#003087',borderBottom:'1px solid #e5e7eb',background:mi%2===0?'#eff6ff':'#e8f0ff'}}>{st.total}</td>
                    </tr>
                  );
                })}
                {/* Daily coverage row */}
                <tr style={{background:'#003087'}}>
                  <td style={{position:'sticky',left:0,padding:'5px 12px',fontSize:10,fontWeight:700,color:'#c9a84c',background:'#003087',borderRight:'1px solid rgba(255,255,255,.2)',whiteSpace:'nowrap'}}>Κάλυψη/βάρδια</td>
                  {Array.from({length:days},(_,i)=>i+1).map(d=>{
                    const covered=SHIFT_TYPES.filter(s=>members.some(m=>getShift(m.id,d)===s)).length;
                    return(
                      <td key={d} style={{padding:'4px 2px',textAlign:'center',borderRight:'1px solid rgba(255,255,255,.1)'}}>
                        <span style={{fontSize:10,fontWeight:700,color:covered===3?'#86efac':covered===2?'#fcd34d':'#fca5a5'}}>{covered}/3</span>
                      </td>
                    );
                  })}
                  <td style={{background:'#003087'}}/>
                </tr>
              </tbody>
            </table>
          </div>
        )}

        {/* Legend */}
        <div style={{marginTop:10,display:'flex',flexWrap:'wrap',gap:6,alignItems:'center'}}>
          <span style={{fontSize:10,color:'#6b7280',fontWeight:700,marginRight:2}}>ΥΠΟΜΝΗΜΑ:</span>
          {ALL_STATES.filter(x=>x!=='—').map(s=>(
            <span key={s} style={{display:'inline-flex',alignItems:'center',gap:4,padding:'2px 8px',borderRadius:3,fontSize:10,background:COLORS[s].bg,color:COLORS[s].tx,border:`1px solid ${COLORS[s].bd}`,fontWeight:700}}>
              {s} — {SHORT[s]}
            </span>
          ))}
          <span style={{fontSize:9,color:'#6b7280',marginLeft:4}}>★ = Αργία &nbsp;|&nbsp; Μωβ φόντο = Αργία &nbsp;|&nbsp; Γκρι = ΣΚ</span>
        </div>
      </>)}

      {/* ════ REQUESTS ════ */}
      {tab==='requests'&&(
        <div style={{maxWidth:760}}>
          <div className="card">
            <div className="sec">📝 Αιτήσεις Προσωπικού — {MONTH_N[mo]} {yr}</div>
            <div style={{padding:'8px 12px',background:'#eff6ff',borderRadius:4,border:'1px solid #bfdbfe',fontSize:11,color:'#1e40af',marginBottom:14,lineHeight:1.6}}>
              <strong>Προτεραιότητα:</strong> 1) Εγκεκριμένη άδεια / Αναρρωτική → δεσμευτικά &nbsp;|&nbsp; 2) Επιθυμητά ρεπό & προτίμηση βάρδιας → εφόσον επιτρέπεται
            </div>

            {/* Member selector */}
            <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:14}}>
              {members.map(m=>{
                const r=requests[m.id]||{};
                const total=(r.leave?.length||0)+(r.sick?.length||0)+(r.prefRest?.length||0);
                return(
                  <button key={m.id} onClick={()=>setReqMember(reqMember?.id===m.id?null:m)}
                    style={{padding:'6px 13px',borderRadius:4,cursor:'pointer',fontWeight:700,fontSize:11,fontFamily:'Arial',transition:'all .2s',
                      background:reqMember?.id===m.id?'#003087':'white',
                      color:reqMember?.id===m.id?'white':'#003087',
                      border:`1px solid ${reqMember?.id===m.id?'#003087':'#d1d5db'}`}}>
                    {m.name}{total>0&&<span style={{marginLeft:5,fontSize:9,background:reqMember?.id===m.id?'rgba(255,255,255,.25)':'#dbeafe',color:reqMember?.id===m.id?'white':'#1e40af',borderRadius:2,padding:'1px 4px'}}>{total}</span>}
                  </button>
                );
              })}
            </div>

            {reqMember&&(()=>{
              const req=requests[reqMember.id]||{leave:[],sick:[],prefRest:[],prefShift:[]};
              return(<>
                {/* Sub-tabs */}
                <div style={{display:'flex',gap:5,marginBottom:12,borderBottom:'1px solid #e5e7eb',paddingBottom:10}}>
                  {[['leave','🏖 Άδεια','#7f1d1d','#fee2e2'],['sick','🏥 Αναρρωτική','#7c2d12','#ffedd5'],['prefRest','💤 Επιθ. Ρεπό','#14532d','#dcfce7'],['prefShift','⭐ Προτ. Βάρδια','#1e40af','#dbeafe']].map(([t,lbl,col,bg])=>(
                    <button key={t} onClick={()=>setReqTab(t)}
                      style={{padding:'5px 13px',borderRadius:4,cursor:'pointer',fontWeight:700,fontSize:11,fontFamily:'Arial',
                        background:reqTab===t?col:'white',color:reqTab===t?'white':col,border:`1px solid ${col}`}}>
                      {lbl} {req[t]?.length>0&&`(${req[t].length})`}
                    </button>
                  ))}
                </div>

                {reqTab==='prefShift'?(
                  <div>
                    <div style={{fontSize:11,color:'#4b5563',marginBottom:10}}>Επιλέξτε προτιμώμενες βάρδιες (ο scheduler θα τις ευνοεί):</div>
                    <div style={{display:'flex',gap:8}}>
                      {SHIFT_TYPES.map(s=>{
                        const sel=(req.prefShift||[]).includes(s);
                        return(
                          <button key={s} onClick={()=>togglePrefShift(reqMember.id,s)}
                            style={{padding:'8px 20px',borderRadius:4,cursor:'pointer',fontWeight:700,fontSize:12,fontFamily:'Arial',
                              background:sel?COLORS[s].bg:'white',color:sel?COLORS[s].tx:'#374151',border:`1px solid ${sel?COLORS[s].bd:'#d1d5db'}`,
                              outline:sel?`2px solid ${COLORS[s].bd}`:'none',outlineOffset:1}}>
                            {SHORT[s]}
                          </button>
                        );
                      })}
                    </div>
                  </div>
                ):(
                  <>
                    <div style={{fontSize:11,color:'#4b5563',marginBottom:8}}>
                      {{leave:'Εγκεκριμένες ημέρες αδείας (δεσμευτικό — δεν ανατίθεται βάρδια):',sick:'Ημέρες αναρρωτικής (δεσμευτικό):',prefRest:'Επιθυμητές ημέρες ρεπό (εφόσον δεν απαιτείται κάλυψη):'}[reqTab]}
                    </div>
                    {/* Calendar grid */}
                    <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:4,maxWidth:340}}>
                      {DAY_N.map(dn=><div key={dn} style={{textAlign:'center',fontSize:9,fontWeight:700,color:'#6b7280',padding:'3px 0',borderBottom:'1px solid #e5e7eb'}}>{dn}</div>)}
                      {Array.from({length:(()=>{const d=new Date(yr,mo,1).getDay();return d===0?6:d-1})()}).map((_,i)=><div key={`o${i}`}/>)}
                      {Array.from({length:days},(_,i)=>i+1).map(d=>{
                        const active=hasReq(reqMember.id,d,reqTab);
                        const dow=getDow(yr,mo,d);
                        const wk=isWeekend(dow);
                        const col={leave:'#7f1d1d',sick:'#7c2d12',prefRest:'#14532d'}[reqTab];
                        const bgA={leave:'#fee2e2',sick:'#ffedd5',prefRest:'#dcfce7'}[reqTab];
                        const bdA={leave:'#fca5a5',sick:'#fb923c',prefRest:'#86efac'}[reqTab];
                        return(
                          <button key={d} onClick={()=>toggleReqDay(reqMember.id,d,reqTab)}
                            style={{padding:'6px 2px',borderRadius:4,cursor:'pointer',fontWeight:700,fontSize:12,textAlign:'center',fontFamily:'Arial',
                              background:active?bgA:wk?'#f1f5f9':'#f9fafb',
                              color:active?col:'#374151',
                              border:`1px solid ${active?bdA:'#e5e7eb'}`,
                              transform:active?'scale(1.06)':'scale(1)',transition:'all .15s'}}>
                            {d}
                          </button>
                        );
                      })}
                    </div>
                    <div style={{marginTop:10,fontSize:11,color:'#6b7280'}}>
                      Επιλεγμένες: <strong style={{color:'#003087'}}>{(req[reqTab]||[]).join(', ')||'—'}</strong>
                    </div>
                  </>
                )}
                <div style={{marginTop:14,borderTop:'1px solid #e5e7eb',paddingTop:10}}>
                  <button onClick={()=>{const nr={...requests,[reqMember.id]:{leave:[],sick:[],prefRest:[],prefShift:[]}};setRequests(nr);saveReq(nr)}} className="gbtn" style={{fontSize:11}}>✕ Εκκαθάριση όλων αιτήσεων</button>
                </div>
              </>);
            })()}
            {!reqMember&&<div style={{textAlign:'center',padding:30,color:'#9ca3af',fontSize:12}}>Επιλέξτε αστυφύλακα</div>}
          </div>
        </div>
      )}

      {/* ════ STATS ════ */}
      {tab==='stats'&&(
        <div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(270px,1fr))',gap:12,marginBottom:14}}>
            {members.map(m=>{
              const st=getStats(m.id);
              return(
                <div key={m.id} className="card">
                  <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:12,paddingBottom:10,borderBottom:'2px solid #003087'}}>
                    <div style={{width:34,height:34,borderRadius:'50%',background:'#003087',display:'flex',alignItems:'center',justifyContent:'center',color:'#c9a84c',fontWeight:700,fontSize:13,flexShrink:0}}>{m.name.charAt(0)}</div>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:700,fontSize:13}}>{m.name}</div>
                      <div style={{fontSize:10,color:'#6b7280'}}>{m.rank}</div>
                    </div>
                    <span style={{fontWeight:700,fontSize:20,color:'#003087'}}>{st.total}</span>
                  </div>
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:5}}>
                    {[['Π','Πρωί','#1e40af'],['Α','Απόγ.','#92400e'],['Ν','Νύχτα','#3730a3'],['αα','Αδιάθ.','#6b21a8'],['Ρ','Ρεπό','#14532d'],['Ά','Άδεια','#991b1b'],['Αν','Αναρρ.','#7c2d12']].map(([k,lbl,col])=>(
                      <div key={k} style={{display:'flex',justifyContent:'space-between',padding:'4px 7px',borderRadius:3,background:COLORS[k].bg,border:`1px solid ${COLORS[k].bd}`}}>
                        <span style={{fontSize:10,color:COLORS[k].tx,fontWeight:700}}>{lbl}</span>
                        <span style={{fontWeight:700,fontSize:12,color:col}}>{st[k]||0}</span>
                      </div>
                    ))}
                    <div style={{display:'flex',justifyContent:'space-between',padding:'4px 7px',borderRadius:3,background:'#f0f9ff',border:'1px solid #bae6fd',gridColumn:'1/-1'}}>
                      <span style={{fontSize:10,color:'#0c4a6e',fontWeight:700}}>Σαββατοκύριακα</span>
                      <span style={{fontWeight:700,fontSize:12,color:'#0c4a6e'}}>{st.weekend}</span>
                    </div>
                    <div style={{display:'flex',justifyContent:'space-between',padding:'4px 7px',borderRadius:3,background:'#faf5ff',border:'1px solid #e9d5ff',gridColumn:'1/-1'}}>
                      <span style={{fontSize:10,color:'#581c87',fontWeight:700}}>Αργίες</span>
                      <span style={{fontWeight:700,fontSize:12,color:'#581c87'}}>{st.holiday}</span>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
          {/* Daily coverage */}
          <div className="card">
            <div className="sec">Κάλυψη Βαρδιών ανά Ημέρα</div>
            <div style={{overflowX:'auto'}}>
              <table style={{borderCollapse:'collapse',fontSize:10}}>
                <thead>
                  <tr>
                    <th style={{padding:'4px 8px',textAlign:'left',color:'#6b7280',fontWeight:700,borderBottom:'1px solid #e5e7eb',minWidth:60}}>Βάρδια</th>
                    {Array.from({length:days},(_,i)=>i+1).map(d=>{
                      const dow=getDow(yr,mo,d);
                      return <th key={d} style={{padding:'4px 3px',textAlign:'center',minWidth:28,color:isWeekend(dow)?'#1e40af':'#374151',fontWeight:700,borderBottom:'1px solid #e5e7eb'}}>{d}</th>;
                    })}
                  </tr>
                </thead>
                <tbody>
                  {SHIFT_TYPES.map(s=>(
                    <tr key={s}>
                      <td style={{padding:'4px 8px',fontWeight:700,color:COLORS[s].tx,background:COLORS[s].bg,borderBottom:'1px solid #e5e7eb'}}>{SHORT[s]}</td>
                      {Array.from({length:days},(_,i)=>i+1).map(d=>{
                        const who=members.filter(m=>getShift(m.id,d)===s);
                        return(
                          <td key={d} style={{padding:'3px',textAlign:'center',borderBottom:'1px solid #e5e7eb',borderRight:'1px solid #f3f4f6',background:who.length===0?'#fef2f2':who.length>1?'#fffbeb':'transparent'}}>
                            {who.length>0
                              ?<span title={who.map(m=>m.name).join(', ')} style={{fontSize:9,fontWeight:700,color:who.length===params.staffPerShift?'#14532d':who.length===0?'#991b1b':'#92400e'}}>
                                {who.length===1?who[0].name.split(' ')[0]:who.length}
                              </span>
                              :<span style={{color:'#fca5a5',fontWeight:700,fontSize:10}}>✕</span>
                            }
                          </td>
                        );
                      })}
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      )}

      {/* ════ FAIRNESS ════ */}
      {tab==='fairness'&&(()=>{
        const curFair=history[mk]?.fairness||{};
        const prevFair=history[pmk2]?.fairness||{};
        const maxN=Math.max(...members.map(m=>(curFair[m.id]?.Ν||0)),1);
        const maxP=Math.max(...members.map(m=>(curFair[m.id]?.Π||0)),1);
        const maxA=Math.max(...members.map(m=>(curFair[m.id]?.Α||0)),1);
        const maxW=Math.max(...members.map(m=>(curFair[m.id]?.weekend||0)),1);
        return(
          <div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(290px,1fr))',gap:12,marginBottom:14}}>
              {members.map(m=>{
                const f=curFair[m.id]||initFairness();
                const pf=prevFair[m.id]||initFairness();
                return(
                  <div key={m.id} className="card">
                    <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12,paddingBottom:8,borderBottom:'2px solid #003087'}}>
                      <div style={{width:30,height:30,borderRadius:'50%',background:'#003087',display:'flex',alignItems:'center',justifyContent:'center',color:'#c9a84c',fontWeight:700,fontSize:12,flexShrink:0}}>{m.name.charAt(0)}</div>
                      <div>
                        <div style={{fontWeight:700,fontSize:12}}>{m.name}</div>
                        <div style={{fontSize:9,color:'#6b7280'}}>{m.rank}</div>
                      </div>
                      <div style={{marginLeft:'auto',textAlign:'right'}}>
                        <div style={{fontSize:9,color:'#6b7280'}}>Βαθμ. δικαιοσύνης</div>
                        <div style={{fontWeight:700,fontSize:16,color:'#003087'}}>{priorityScore(f,params).toFixed(1)}</div>
                      </div>
                    </div>
                    <FairnessBar label={`Νύχτες (${MONTH_N[mo]})`} val={f.Ν||0} max={maxN} color='#4338ca'/>
                    <FairnessBar label={`Πρωινές (${MONTH_N[mo]})`} val={f.Π||0} max={maxP} color='#1e40af'/>
                    <FairnessBar label={`Απογευματινές (${MONTH_N[mo]})`} val={f.Α||0} max={maxA} color='#92400e'/>
                    <FairnessBar label={`ΣΚ/Αργίες (${MONTH_N[mo]})`} val={f.weekend||0} max={maxW} color='#0c4a6e'/>
                    <div style={{marginTop:8,paddingTop:8,borderTop:'1px solid #e5e7eb',display:'flex',gap:6}}>
                      <div style={{flex:1,padding:'4px 6px',borderRadius:3,background:'#f0fdf4',border:'1px solid #86efac',textAlign:'center'}}>
                        <div style={{fontSize:9,color:'#6b7280'}}>Ικανοπ.</div>
                        <div style={{fontWeight:700,color:'#14532d'}}>{f.satisfied||0}</div>
                      </div>
                      <div style={{flex:1,padding:'4px 6px',borderRadius:3,background:'#fffbeb',border:'1px solid #fcd34d',textAlign:'center'}}>
                        <div style={{fontSize:9,color:'#6b7280'}}>Απορρίφ.</div>
                        <div style={{fontWeight:700,color:'#92400e'}}>{f.denied||0}</div>
                      </div>
                      <div style={{flex:1,padding:'4px 6px',borderRadius:3,background:'#eff6ff',border:'1px solid #bfdbfe',textAlign:'center'}}>
                        <div style={{fontSize:9,color:'#6b7280'}}>Νύχτες (ιστ.)</div>
                        <div style={{fontWeight:700,color:'#1e40af'}}>{(pf.Ν||0)+(f.Ν||0)}</div>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
            <div className="card">
              <div className="sec">Ιστορικό Δικαιοσύνης — Συγκεντρωτικά</div>
              <div style={{overflowX:'auto'}}>
                <table style={{borderCollapse:'collapse',width:'100%',fontSize:11}}>
                  <thead>
                    <tr style={{background:'#f8fafc'}}>
                      <th style={{padding:'8px 10px',textAlign:'left',fontWeight:700,color:'#003087',borderBottom:'2px solid #003087',minWidth:120}}>Αστυφύλακας</th>
                      {['Νύχτες','Πρωινές','Απογ.','ΣΚ','Αργίες','Ικανοπ.','Απορρίφ.','Βαθμός'].map(h=>(
                        <th key={h} style={{padding:'8px 6px',textAlign:'center',fontWeight:700,color:'#374151',borderBottom:'2px solid #003087'}}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {members.map((m,i)=>{
                      const f=curFair[m.id]||initFairness();
                      const score=priorityScore(f,params);
                      return(
                        <tr key={m.id} style={{background:i%2===0?'#fff':'#f8fafc'}}>
                          <td style={{padding:'7px 10px',fontWeight:700,color:'#003087',borderBottom:'1px solid #e5e7eb'}}>{m.name}</td>
                          {[f.Ν||0,f.Π||0,f.Α||0,f.weekend||0,f.holiday||0,f.satisfied||0,f.denied||0].map((v,vi)=>(
                            <td key={vi} style={{padding:'7px 6px',textAlign:'center',borderBottom:'1px solid #e5e7eb',fontWeight:700,color:vi===6&&v>0?'#dc2626':vi===5&&v>0?'#14532d':'#1a1a2e'}}>{v}</td>
                          ))}
                          <td style={{padding:'7px 6px',textAlign:'center',borderBottom:'1px solid #e5e7eb',fontWeight:700,color:'#003087'}}>{score.toFixed(1)}</td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
              <div style={{marginTop:8,fontSize:10,color:'#6b7280'}}>* Βαθμός δικαιοσύνης: χαμηλότερος = προτεραιότητα στον επόμενο προγραμματισμό</div>
            </div>
          </div>
        );
      })()}

      {/* ════ SETTINGS ════ */}
      {tab==='settings'&&(
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(320px,1fr))',gap:14}}>
          {/* Personnel */}
          <div className="card">
            <div className="sec">👥 Προσωπικό</div>
            <div style={{display:'flex',flexDirection:'column',gap:6,marginBottom:12}}>
              {members.map(m=>(
                <div key={m.id} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'8px 10px',borderRadius:4,background:'#f8fafc',border:'1px solid #e5e7eb'}}>
                  <div>
                    <div style={{fontWeight:700,fontSize:12,color:'#003087'}}>{m.name}</div>
                    <div style={{fontSize:10,color:'#6b7280'}}>{m.rank}</div>
                  </div>
                  <button onClick={()=>removeMember(m.id)} className="dbtn" style={{padding:'3px 10px',fontSize:11}}>Αφαίρεση</button>
                </div>
              ))}
              {!members.length&&<div style={{color:'#9ca3af',fontSize:12,textAlign:'center',padding:12}}>Κανένας αστυφύλακας.</div>}
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr auto',gap:6,marginBottom:6}}>
              <input className="inp" value={newName} onChange={e=>setNewName(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addMember()} placeholder="Ονοματεπώνυμο..."/>
              <button onClick={addMember} className="pbtn">+ Προσθήκη</button>
            </div>
            <select className="sel" style={{width:'100%'}} value={newRank} onChange={e=>setNewRank(e.target.value)}>
              {RANKS.map(r=><option key={r}>{r}</option>)}
            </select>
          </div>

          {/* Parameters */}
          <div className="card">
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
              <div className="sec" style={{margin:0,border:'none',padding:0}}>⚙️ Παράμετροι Κανονισμού</div>
              {!paramEdit
                ?<button onClick={()=>{setLocalParams({...params});setParamEdit(true)}} className="gbtn" style={{fontSize:11,padding:'4px 10px'}}>Επεξεργασία</button>
                :<div style={{display:'flex',gap:5}}>
                  <button onClick={()=>{setParams(localParams);saveParams(localParams);setParamEdit(false);flash('Παράμετροι αποθηκεύτηκαν')}} className="pbtn" style={{fontSize:11,padding:'4px 10px'}}>✓ Αποθήκευση</button>
                  <button onClick={()=>setParamEdit(false)} className="gbtn" style={{fontSize:11,padding:'4px 10px'}}>Ακύρωση</button>
                </div>
              }
            </div>
            {[
              ['staffPerShift','Αστυφύλακες ανά βάρδια',1,5,1],
              ['minRestHours','Ελάχιστη ανάπαυση (ώρες)',8,24,1],
              ['maxConsecShifts','Μέγ. συνεχόμενες βάρδιες',3,10,1],
              ['maxNightsPerMonth','Μέγ. νύχτες/μήνα',4,20,1],
              ['maxNightsPerWeek','Μέγ. νύχτες/εβδομάδα',1,5,1],
              ['maxLeavesSimult','Μέγ. ταυτόχρονες άδειες',1,4,1],
              ['weekendWeight','Βάρος ΣΚ (fairness)',0.5,3,0.1],
            ].map(([key,lbl,min,max,step])=>(
              <div key={key} style={{marginBottom:10}}>
                <div style={{display:'flex',justifyContent:'space-between',fontSize:11,marginBottom:4}}>
                  <label style={{color:'#374151',fontWeight:600}}>{lbl}</label>
                  <span style={{fontWeight:700,color:'#003087'}}>{paramEdit?localParams[key]:params[key]}</span>
                </div>
                {paramEdit?(
                  <input type="range" min={min} max={max} step={step} value={localParams[key]}
                    onChange={e=>setLocalParams(p=>({...p,[key]:parseFloat(e.target.value)}))}
                    style={{width:'100%',accentColor:'#003087'}}/>
                ):(
                  <div style={{height:5,background:'#e5e7eb',borderRadius:3}}>
                    <div style={{width:`${Math.min(100,((params[key]-min)/(max-min))*100)}%`,height:'100%',background:'#003087',borderRadius:3}}/>
                  </div>
                )}
              </div>
            ))}
          </div>

          {/* Cross-month history */}
          <div className="card">
            <div className="sec">📅 Cross-Month Ιστορικό</div>
            <div style={{fontSize:11,color:'#4b5563',marginBottom:10,lineHeight:1.6}}>
              Το σύστημα διατηρεί ιστορικό fairness, τελευταίων βαρδιών και αδειών ανά μήνα. Ο νέος μήνας ξεκινά από εκεί που σταμάτησε ο προηγούμενος.
            </div>
            {Object.keys(history).length>0?(
              <div style={{display:'flex',flexDirection:'column',gap:5}}>
                {Object.keys(history).sort().reverse().slice(0,6).map(k=>{
                  const h=history[k];
                  return(
                    <div key={k} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'6px 10px',borderRadius:4,background:'#f8fafc',border:'1px solid #e5e7eb'}}>
                      <div>
                        <span style={{fontWeight:700,color:'#003087',fontSize:12}}>{k}</span>
                        <span style={{fontSize:10,color:'#6b7280',marginLeft:8}}>{h.log?.satisfied?.length||0} ικανοπ. | {h.log?.rejected?.length||0} απορρ.</span>
                      </div>
                      {k===mk&&<span style={{fontSize:9,background:'#dcfce7',color:'#14532d',border:'1px solid #86efac',borderRadius:2,padding:'1px 5px'}}>Τρέχων</span>}
                    </div>
                  );
                })}
              </div>
            ):<div style={{color:'#9ca3af',fontSize:12}}>Δεν υπάρχει ιστορικό ακόμα.</div>}
            <div style={{marginTop:10,display:'flex',gap:6}}>
              <button onClick={()=>{
                const data=JSON.stringify({members,history,params},null,2);
                const a=document.createElement('a');a.href='data:application/json,'+encodeURIComponent(data);
                a.download=`elas_backup_${new Date().toISOString().slice(0,10)}.json`;a.click();
              }} className="gbtn" style={{fontSize:11,flex:1}}>⬇ Export JSON</button>
              <label style={{flex:1}}>
                <input type="file" accept=".json" style={{display:'none'}} onChange={e=>{
                  const f=e.target.files[0];if(!f)return;
                  const r=new FileReader();
                  r.onload=ev=>{try{const d=JSON.parse(ev.target.result);
                    if(d.members)setMembers(d.members),saveMembers(d.members);
                    if(d.history)setHistory(d.history),saveHistory(d.history);
                    if(d.params)setParams(d.params),saveParams(d.params);
                    flash('Import επιτυχές');
                  }catch{flash('Σφάλμα import')}};
                  r.readAsText(f);
                }}/>
                <span className="gbtn" style={{fontSize:11,display:'block',textAlign:'center',cursor:'pointer'}}>⬆ Import JSON</span>
              </label>
            </div>
          </div>

          {/* Rules reminder */}
          <div className="card">
            <div className="sec">📋 Κανονισμός Βάρδιας</div>
            <div style={{fontSize:11,color:'#374151',lineHeight:1.9}}>
              {[['🔴','Υποχρεωτικοί κανόνες','Νομιμότητα, αδιάθετο, κάλυψη υπηρεσιών'],['🟡','Δικαιοσύνη','Ισοκατανομή νυχτών, ΣΚ, αργιών'],['🟢','Προτιμήσεις','Ρεπό, άδεια, βάρδια (εφόσον δεν παραβιάζουν ανώτερους κανόνες)']].map(([ic,t,d])=>(
                <div key={t} style={{display:'flex',gap:8,marginBottom:6,padding:'5px 8px',borderRadius:4,background:'#f8fafc',border:'1px solid #e5e7eb'}}>
                  <span>{ic}</span><div><strong>{t}:</strong> {d}</div>
                </div>
              ))}
              <div style={{marginTop:8,padding:'7px 10px',borderRadius:4,background:'#eff6ff',borderLeft:'3px solid #003087',fontSize:10,color:'#1e40af'}}>
                Μετά από <strong>νυχτερινή</strong>: υποχρεωτικό αδιάθετο (αα) — αδιαπραγμάτευτο.<br/>
                Ιστορικό δικαιοσύνης: αποθηκεύεται σε cookies + localStorage.
              </div>
            </div>
          </div>
        </div>
      )}

      {/* Footer */}
      <div style={{marginTop:24,paddingTop:12,borderTop:'1px solid #d1d5db',display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:8}}>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <PoliceEmblem sz={24}/>
          <div>
            <div style={{fontSize:10,fontWeight:700,color:'#003087'}}>Ελληνική Αστυνομία — ΕΛ.ΑΣ.</div>
            <div style={{fontSize:9,color:'#9ca3af'}}>Σύστημα Αυτόματου Προγραμματισμού Βαρδιών v5.0</div>
          </div>
        </div>
        <div style={{fontSize:9,color:'#9ca3af'}}>🔒 Εμπιστευτικό — Εσωτερική Χρήση Μόνο</div>
      </div>
    </div>
  </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
